ayDNS منتشر شد. در این نسخه حالت \n#پروکسی\n به اپ اضافه شده و کاربران می‌توانند اپ هایی مانند تلگرام رو مستقیماً از تونل بگذرانند. قابلیت های بیشتری به اسکنر ریزالور ها استفاده شده و بسیار سریع تر از نسخه های قبلی است. کانفیگ های پیش گزیده بیشتری به اپ اضافه شده.\nلینک گیتهاب:\nhttps://github.com/Starling226/vaydns-vpn/releases/tag/v1.8.0\nلینک داخلی به زودی...\n@xsfilterrnet\n \n👑", "date": "2026-05-02 14:40:17"}, {"text": "🍷\nوب‌سایت فیلم و سریال Azfilm رایگان و بدون سانسور:\n13,755 عنوان فیلم و سریال\n⚡️\n🌎\n \nhttps://azfilm.theazizi.ir\n💡\n دریافت نرم‌افزار ها و ابزار های پیشنهادی برای دانلود و پخش:\n🌎\n \nhttps://azfcdn.theazizi.ir\n@xsfilterrnet\n \n👑", "date": "2026-05-02 16:51:10"}, {"text": "🍷\nآموزش ساده اجرای Nova–Proxy–App\n– هدف این برنامه چیه؟ \nهدف این برنامه اینه که به جای تکیه کردن روی فقط یه روش ساده برای دور زدن فیلترینگ، مثل یه جعبه ابزار همه‌کاره عمل میکنه و چند تا ترفند رو با هم ترکیب میکنه تا بتونی به روش‌های مختلف به اینترنت آزاد وصل بشی.\nنوا پروکسی با متود‌هایی مثل  QUIC (HTTP/3), MITM, Transparent, TLS-RF, Server Mode, Warp کاری میکنه که بتونی سیستم فیلترینگ رو دور بزنی!\nنکته: درحال حاضر با اینترنت ملی فقط روش MITM کار میکنه و سایت‌های گوگل و یوتیوب به راحتی آب خوردن بالا میاد!\n چطور نصب و اجرا کنی؟ \n ۱. دانلود و اجرا \nبرو تو همون صفحه گیت‌هاب پروژه، از بخش Releases، آخرین نسخه برنامه (فایل NovaProxy.exe) رو برای ویندوزت دانلود کن و یا اگه نمیتونی از گیتهاب دانلود کنی از فایل تلگرامی که گذاشتم برات استفاده کن.\n ۲. نصب گواهی (این خیلی مهمه!) \nبرای اینکه برنامه بتونه ترافیکت رو امن کنه و فیلترینگ رو گول بزنه، باید گواهی امنیتیش رو روی ویندوزت نصب کنی.\nتو محیط برنامه، برو بخش «مدیریت گواهی» (Certificate Management).\nروی «کلیک برای نصب مجدد گواهی» بزن و هر پیامی که رو صفحه اومد رو تایید (Yes) کن.\n ۳. روشن کردن پروکسی: \nحالا فقط کافیه دکمه «شروع پروکسی» (Start Proxy) رو بزنی.\nدکمه «پروکسی سیستمی» رو هم فعال کن تا کل اینترنت کامپیوترت از این فیلترشکن رد بشه.\nبقیه‌ش رو بسپار به خود برنامه، چون خودش هوشمندانه تصمیم می‌گیره برای هر سایت فیلتر شده از چه ترفندی استفاده کنه تا سریع برات باز بشه. الان درحال حاضر با نت ملی فقط روش MITIM جواب میده که روی حالت پیش‌فرض خودش هست.\n حالت‌های مختلف دیگه‌ش چیاست؟ \nاگه کنجکاوی اون روش‌های دیگه که گفتم چیا هستن، ساده‌ش میشه:\nحالت فرد میانی (MITM): برنامه مثل یه واسطه عمل می‌کنه؛ میاد برچسب اسم سایت فیلتر شده رو برمیداره و جاش یه سایت مجاز می‌ذاره تا فیلترینگ رکب بخوره (دلیل اون نصب گواهینامه تو قدم دوم، همین بود).\nتکه‌تکه‌سازی (TLS-RF): درخواستت رو به قطعات خیلی خیلی ریز تقسیم میکنه. سیستم فیلترینگ گیج میشه و نمی‌تونه به این سرعت قطعات رو سر هم کنه تا بخوندشون، پس ولش میکنه بره.\nحالت QUIC: از یه زبون ارتباطی جدیدتر تو اینترنت استفاده می‌کنه که فیلتر کردنش خیلی سخت‌تره (برای گوگل و یوتیوب خیلی خوبه).\nحالت سرور (Server): درخواستت رو می‌فرسته به یه سرور آزاد (مثل کلودفلر) و اون سرور، سایت فیلتر شده رو برات می‌گیره و می‌فرسته.\nحالت WARP: از تونل معروف Warp استفاده می‌کنه تا یه آیپی تمیز بهت بده (برای وقتایی که می‌خوای از ChatGPT یا بقیه هوش مصنوعی‌ها استفاده کنی عالیه).\nویژگی خوب نوا پروکسی همون بخش مسیریابی خودکارشه (Auto Routing)؛ مثلا اگه یه روشی روی اینترنت تو جواب نداد، خودش اتوماتیک می‌ره سراغ یه روش دیگه تا بالاخره سایت رو برات باز کنه و نیاز نیست تو دستی هی تنظیمات رو عوض کنی!\nفقط برنامه رو نصب کن و طبق آموزش جلو برو کاری دیگه ای نیاز نیست بکنی!\nگیتهاب پروژه:\n⚡️\nhttps://github.com/IRNova/Nova-Proxy-App/\nدانلود برنامه با لینک داخلی:\n⚡️\nhttps://punkpaste.ir/f/Nova-App-V1-cp073m\nرمز دانلود:\n@TheVPNMethod\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-05-02 17:31:49"}, {"text": "🔋\nبرای باز شدن سرویس‌های Google مثل Drive و Script و Gmail مشکل دارید، می‌تونید از DNS های شکن استفاده کنید.\n178.22.122.100\n185.51.200.2\nروی یکسری نتا جواب میده\nروی ست کنید dns changer\n@xsfilterrnet\n \n👑", "date": "2026-05-02 18:50:20"}, {"text": "🔋\nبرای باز شدن سرویس‌های Google مثل Drive و Script و Gmail مشکل دارید، می‌تونید از DNS های شکن استفاده کنید.  178.22.122.100 185.51.200.2  روی یکسری نتا جواب میده روی ست کنید dns changer  @xsfilterrnet \n👑", "date": "2026-05-02 20:23:53"}, {"text": "✈️\nبالا اوردن کانال های تلگرامی روی ios روی نت داخلی\nاینو یکی از عزیزان کانال‌ تست کرده روی ios  اجراش کرده جواب داده فرستاده\n@ARSH_66\nبا نصب ish shell روی ios\nhttps://apps.apple.com/us/app/ish-shell/id1436902243\nلینک پروژه گیت هاب \nhttps://github.com/ish-app/ish\nبعد از  نصب بری داخلش بزنید پکیجاش نصب شه\napk update\napk add php php-cli php-openssl php-mbstring\napk add php-curl\napk add php-json\nو در اخر\nmkdir /root/www\nانتقال فایل های ezytel با استفاده از اپ files (که دیفالت توی همه گوشی های آیفون نصب هست) به اپ iSH توی مسیری که بالا ساختیم\nاجرای php با دستور زیر داخل ish\nphp -S 0.0.0.0:8080\nبعد برید توی سافاری یا کروم آدرس زیر بزنید \nhttp://127.0.0.1:8080/ezytel\n@xsfilterrnet\n \n👑\n@ConfigWireguard\n \n⚡️", "date": "2026-05-03 09:48:39"}, {"text": "🍷\n نسخه تست همگانی کلاینت VPN وایت‌دی‌ان‌اس منتشر شد\nدر این نسخه از WhiteDNS، هسته ارتباطی روی StormDNS ساخته شده و ما تا جای ممکن آن را برای شبکه‌های محدود، ناپایدار و پر اختلال بهینه کرده‌ایم.\nبرای اتصال، نیازی به وارد کردن سرور، کلید یا تنظیمات پیچیده ندارید. فقط کافی است Resolverهای خودتان را وارد کنید یا از لیست آماده داخل برنامه استفاده کنید. اپلیکیشن Resolverها را تست می‌کند، مسیرهای سالم را پیدا می‌کند و سپس به صورت خودکار اتصال را برقرار می‌کند.\nقابلیت‌های فعلی:\n✅\n اتصال Full System VPN برای کل گوشی\n✅\n حالت Proxy Only برای استفاده دستی\n✅\n استفاده از چندین سرور داخلی WhiteDNS\n✅\n تست خودکار Resolverها قبل از اتصال\n✅\n امکان استفاده از لیست آماده Resolverها\n✅\n تنظیمات پیشرفته MTU برای شبکه‌های سخت‌تر\n✅\n نمایش سرعت دانلود، آپلود و مصرف کل دیتا\n✅\n لاگ اتصال برای بررسی خطاها و وضعیت کانکشن\n✅\n بدون نیاز به وارد کردن کلید یا دامنه توسط کاربر\nاگر روی \n#اینترنت\n شما اتصال سخت برقرار می‌شود، می‌توانید مقادیر MTU را تغییر دهید تا مسیرهای بیشتری شناسایی شوند و اتصال پایدارتر شود.\n‼️\n این اپلیکیشن هنوز \n#نسخه\n تست اولیه است.\nممکن است روی بعضی دستگاه‌ها یا بعضی اپراتورها نیاز به تنظیمات بیشتر داشته باشد.\nلطفاً تست کنید و نتیجه، خطاها و پیشنهادهای خودتان را برای ما بفرستید تا نسخه‌های بعدی سریع‌تر و پایدارتر شوند.\n@WhiteDNS\n \n⚡️\n@xsfilterrnet\n \n👑", "date": "2026-05-03 10:27:06"}, {"text": "🚨\n هشدار امنیتی برای کسانی که از Cloudflare Workers + Custom Domain استفاده می‌کنند\nامروز با یک سناریوی حمله مواجه شدم که به نظرم لازم است بقیه هم درباره‌اش بدانند.\nماجرا این بود که سورس اصلی Worker سالم بود و آدرس مستقیم Worker هم درست کار می‌کرد؛ اما وقتی همان سرویس از طریق دامنه‌ی اختصاصی باز می‌شد، صفحه‌ی جعلی Verification نمایش داده می‌شد. صفحه از کاربر می‌خواست برای ادامه، کلیدهای \nWin + R\n و بعد \nCtrl + V\n را بزند.\nاین مدل حمله معمولاً به اسم ClickFix شناخته می‌شود؛ یعنی مهاجم کاری می‌کند که کاربر خودش یک دستور مخرب را از کلیپ‌بورد اجرا کند.\nنکته‌ی مهم اینجاست: مشکل داخل سورس اصلی Worker نبود.\nدر بررسی مشخص شد یک Worker غیرمجاز داخل اکانت Cloudflare ساخته شده بود و با یک route از نوع wildcard روی دامنه فعال شده بود. این Worker مثل یک proxy عمل می‌کرد: پاسخ اصلی سایت را می‌گرفت، اگر HTML بود قبل از بسته شدن \nbody\n یک اسکریپت مخرب به آن اضافه می‌کرد، و نسخه‌ی دستکاری‌شده را به کاربر نشان می‌داد.\n💡\n یعنی ممکن است:\n✅\n سورس Worker شما سالم باشد\n✅\n آدرس مستقیم \nworkers.dev\n سالم باشد\n❌\n ولی دامنه‌ی اختصاصی شما آلوده دیده شود\n(برای مثال در تصویر ضمیمه شده)\n🗣️\n چون مسیر دامنه از یک Worker/Route دیگر عبور می‌کند.\n🗣️\n چیزهایی که باید چک کنید:\n1. در Cloudflare، بخش Workers Routes را بررسی کنید\n   مخصوصاً routeهای wildcard مثل \n*.domain/*\n2. ببینید Worker ناشناس یا جدیدی داخل اکانت ساخته نشده باشد\n3. بخش Audit Log را برای این موارد چک کنید:\n   * ساخت Worker جدید\n   * تغییر route\n   * ساخت یا استفاده از API Token   * login یا session مشکوک\n4. همچنین Custom Domain را با آدرس مستقیم Worker مقایسه کنید\n   اگر \nworkers.dev\n سالم است ولی دامنه رفتار عجیب دارد، احتمالاً مشکل از route، cache، rule، یا Worker واسط است.\n5. اگر صفحه‌ای دیدید که برای verify شدن از شما می‌خواهد \nWin + R\n، \nCtrl + V یا Enter بزنید، انجام ندهید. این رفتار عادی reCAPTCHA یا Cloudflare نیست.\n❗️\n در این مورد route مخرب حذف شد و دامنه دوباره سالم شد، اما این تجربه نشان داد صرفاً سالم بودن سورس Worker کافی نیست. باید routeها، Workerهای داخل اکانت، sessionها، tokenها و audit log هم بررسی شوند.\n📌\n جزئیات حساس مثل لینک‌ها و کد کامل را عمومی منتشر نمی‌کنم تا سوءاستفاده بیشتر نشود، اما اصل حمله این بود:\nساخت Worker غیرمجاز با حمله اینجکشن و جعل سشن داخل اکانت → وصل کردن به wildcard route → گرفتن پاسخ اصلی → تزریق JavaScript به HTML → نمایش ClickFix جعلی به کاربر\nاگر Cloudflare Workers دارید، همین امروز routeها و Workerهای اکانتتان را چک کنید.\n➕\n همچنین تمامی مستندات برای باگ بانتی کلودفلر ارسال شد.\nپ.ن: گزارش اولیه و هشدار در رابطه با این مشکل، توسط یکی از شما (\n@femininedick\n) برای من ارسال شد.\n👑\n \n@xsfilterrnet\n🗣\n \n@luluch_code\n🏠\n \ntheazizi.ir", "date": "2026-05-03 16:55:41"}, {"text": "🍷\n‏من یه فورک از پروژه mhr-cfw ساختم که باهاش میتونید ورکر رو به جای کلادفلر، روی VPS شخصیتون بالا بیارید. \nمزایاش اینه که :‌\n۱- آیپی ثابت میمونه. \n۲- جمنای و جی پی تی باز میشه. \n۳- محدودیت روزانه کلادفلر رو ندارید.\n✍️\nمنبع توییتر\nلینک پروژه:\n⚡️\nhttps://github.com/aliasoblomov/mhr-vps-worker/tree/main\n@xsfilterrnet\n \n👑", "date": "2026-05-03 23:06:33"}, {"text": "⚡️\nدامین‌های متصل برای متود Vercel–xhttp\n❗️\nفقط کافیه این آدرس هارو در قسمت های Address و SNI کانفیگ VLESS خودتون جایگذاری کنید، و گزینه allowInsecure هم true بزارید.\n🍷\n همه تست شدند و پینگ دارند.\ncommunity.vercel.com\nanalytics.vercel.com\nbotid.vercel.com\nblog.vercel.com\napp.vercel.com\napi.vercel.com\nai.vercel.com\ncursor.com\nnextjs.org\nreact.dev\n@TheVPNMethod\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-28 08:44:12"}, {"text": "آموزش کامل\nمتود Goose–Relay–VPN\nبصورت PDF\nسرعت: بهتر از MHRV\nحجم: مشابه MHRV\nپیش‌نیاز: نیاز به سرور خارج دارد،\nاما نیازی به MITM و سرتیفیکیت ندارد.\nگیتهاب پروژه:\nhttps://github.com/Kianmhz/GooseRelayVPN", "date": "2026-04-28 14:36:50"}, {"text": "📰\n لیست دانلود برنامه ها با اینترنت داخلی \n. لینک ها رو کپی کنید و توی مرورگرتون باز کنید\n🔥\n کلاینت‌ و وی‌پی‌ان (V ضعیف / تاخیردار\n• تست تکی، لیست IP و رنج IP\n• ساخت فایل رنج برای اسکن\n• ذخیره نتایج در فایل\n•اسکن بدون نیاز به vpn \n•کاستوم رنج، پورت\n•قابل اجرا در موبایل و غیره \n•ذخیره بهترین ایپی و رنج ها به صورت txt\n-Best \n-maybe\n-dead\n🦠\n هشدار:\nاین ابزار صرفاً جهت اهداف آموزشی، تست شبکه و بررسی سیستم‌های متعلق به خود کاربر طراحی شده است. هرگونه استفاده غیرمجاز از اسکریپت بر عهده شخص استفاده‌کننده می‌باشد.\n@MiniFoxTeam\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-28 22:03:31"}, {"text": "🍷\nدوستانی که ورسل میزنن یه ابزار زدم کار deploy رو راحت میکنه کد اسکریپت هم رندوم میکنه که ورسل بن نکنه\nفقط کافیه api token بگیرید توش بزنید\nجهت اطلاع ورسل بیتشر اکانت ها رو بسته حتی پرو ولی میشه دورش زد\n🤩\n﻿\n@xsfilterrnet\n \n👑", "date": "2026-04-29 01:09:40"}, {"text": "💡\nآموزش تانل\n \nGoogle\n \nrelay Cloudflare\n📌\nبدون نیاز به سرور خارج\n📌\nایپی غیر از ایران\n📌\nمناسب برای تلگرام وب و اینستاگرام وب\n📌\nروی PC و Android\n✅\n \nموارد نیاز:\n- نصب Python\n- اکانت Cloudflare\n- اکانت Gmail\nفایل های مربوطه\nلینک داخلی پخش ویدیو\n📌\nپروژه:\nhttps://github.com/DarkPoesidon\n@pingplas_channel\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-29 01:38:53"}, {"text": "آموزش آسان متود Netlify–XHTTP–Relay \nاینم مثل همون ورسله ولی راحت تر\nسه روش داره؛\nروش اول: دیپلوی با سایت Netlify (پیشنهادی) \nروش دوم فورک (Fork) کردن: کار می‌کنه ولی توصیه نمی‌شه، چون پروژه‌ت به ریپوی اصلی وصل می‌مونه و ممکنه بعداً دردسر بشه. \nروش سوم با Netlify CLI: برای کسانی که راحت با ترمینال کار می‌کنن.\nروش اول رو توضیح میدم چون بهترینه توام همین رو برو:\nفایل پروژه زیر رو دانلود کن و ذخیره کن و از حالت زیپ خارج کن.\nبرو به سایت \nNetlify.com\n.\nفایل پروژه رو Import کن.\nBuild command رو بذار: npm run build\nPublish directory رو بذار: public\nمتغیر TARGET_DOMAIN رو اضافه کن. (گزینه project configuration بزن و بعد روی Environment variables کلیک کن، و بعد Add variable بزن، اینجا key رو TARGET_DOMAIN وارد کن و مقدار Value هم بزار آدرس سرور خودت)\nدوباره Deploy بزن.\nصبر کن تا Deploy کامل تموم بشه\nبرو به بخش Deploys\nمطمئن شو که آخرین Deploy وضعیت Published (سبز) داره.\nدامنه سایتت رو پیدا کن\nبالای صفحه سایتت در Netlify، یک آدرس مثل این نوشته:\nhttps://xxxxxxxxx.netlify.app\nاین آدرس دامنه اصلی ریلی تو هست. کپی‌اش کن.\n برو Edge Function چک کن درست کار می‌کنه یا نه\nاز منوی سمت چپ برو قسمت Logs & metrics و بعد روی Edge Functions کلیک کن.\nباید یک فانکشن به اسم relay ببینی.\nروی آن کلیک کن و لاگ‌ها را ببین (نباید لاگ و خطا داشته باشه).\nحالا چطور استفاده کنیم؟\nفرض کن دامنه‌ت شد: \nhttps://xxxxxxxx.netlify.app\nهر چیزی که به این دامنه بفرستی، به سرور اصلی‌ت (که در TARGET_DOMAIN گذاشتی) منتقل می‌شه.\nقدم بعدی کانفیگ VLESS (XHTTP)؛\nاین کانفیگ رو کپی کن و در v2ray پیست کن: در این کانفیگ، به‌جای 00000 ها UUID سرور خودتون و به‌جای xxxxxxx ها در قسمت هاست دامنه نتلیفای رو وارد کنید.\nvless://00000000-0000-0000-0000-000000000000@kubernetes.io:443?mode=auto&path=%2Fyourpath&security=tls&alpn=h2%2Chttp%2F1.1&encryption=none&insecure=0&host=xxxxxxx.netlify.app&fp=chrome&type=xhttp&allowInsecure=0&sni=kubernetes.io#Netlify%E2%80%93xhttp%20%40TheVPNMethod\n@TheVPNMethod\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-29 10:30:49"}, {"text": "آموزش ساده\nمتود Netlify–XHTTP–Relay\nسرعت: عالی — حجم: محدود\nپیش‌نیاز: نیاز به سرور خارج دارد.\nگیتهاب پروژه:\nhttps://github.com/amirshaker000/netlify-relay", "date": "2026-04-29 10:31:32"}, {"text": "Netlify–XHTTP–Relay-main.zip", "date": "2026-04-29 12:44:54"}, {"text": "Netlify–XHTTP–Relay.pdf", "date": "2026-04-29 12:50:24"}, {"text": "🍷\nلیست های اخیری که وایت شدن در این ماه:\natlassian.com‎\ncdn77.com‎\ncentos.org‎\ncertum.pl‎\nchess.com‎\ncdnjs.com‎\ncrowdstrike.com‎\ncursor.sh‎\ndebian.org‎\ndeepseek.com‎\ndigicert.com‎\nfedoraproject.org‎\ngithub.com‎\ngoogle.com‎\ngrafana.com‎\nhcaptcha.com‎\njstor.org‎\nletsencrypt.org‎\nmathworks.com‎\nmcafee.com‎\nmongodb.com‎\nnewrelic.com‎\npypi.org‎\npython.org‎\npythonhosted.org‎\nsectigo.com‎\nSheypoor.com‎\nsophos.com‎\nspringer.com‎\nsupercell.com‎\nubuntu.com‎\nunpkg.com‎\nvercel.com‎\nwiley.com‎\n@xsfilterrnet\n \n👑", "date": "2026-04-29 18:49:37"}, {"text": "💡\n متد StormDNS یه فورک از مستر دی ان اسه. الان روی ایرانسل اجراش کردم سرعتش تقریبا دو برابر اونه:)\nفقط مشکل نه چندان خاصش اینه که cpu رو بیشتر درگیر میکنه\nلینک گیتهابش رو میزارم اینجا \nبا termux روی اندروید میشه آوردش بالا.\nhttps://github.com/nullroute1970/StormDNS/releases/tag/v2026.04.26.153956-15aedd9\n✍️\nمنبع توییتر\n@xsfilterrnet\n \n👑", "date": "2026-04-29 20:08:56"}, {"text": "🍷\nاگر نیاز به خرید کانفیگ دارید رفقا\nمیتونید از بات تحت نظر من و خودم به شخصه کانفیگ بگیرید:\n💎\nایدی خودم برای خرید کانفیگ:\n@xsparvin\n🦆\nایدی ربات تحت نظر من:\n@DuckitVPNBot\n💡\nنکته:کانفیگ های ربات با فروش شخصی من از قیمت و سرور متفاوته و بات ادمین خودش رو داره\n❗️\n@xsfilterrnet\n \n👑", "date": "2026-04-29 23:35:36"}, {"text": "🍷\nیک سری مخزن چینی وایت‌لیست شدن و سرعتشون خوبه:\nftpmirror.your.org\n‎\nmirrors.mit.edu\n‎\nmirror.nyist.edu.cn\n‎\nmirrors.bfsu.edu.cn\n‎\n𝕏 Sbehdani\n@xsfilterrnet\n \n👑", "date": "2026-04-30 11:35:55"}, {"text": "🍷\nنسخه جدید کلاینت اندروید\n:\nVayDNS v1.7.6\n🔸\n در این نسخه می‌تونید کانفیگ و ریزالورها را مستقیما وارد اپ کنید.\n🔸\n لطفاً قبل از نصب نسخه جدید، اپلیکیشن قبلی را کاملاً Uninstall کنید.\n🔸\n در این نسخه کانفیگ های بیشتری اضافه شدن.\n• داخل فولدر assets\n• \nکانفیگ ها\n \nConfigs.bin\n• \nریزالورها\n \nresolvers.bin\nرا میتونید از گیت هاب پروژه یا مستقیما از کانال تلگرام \n@vaydnsandroid\n تهیه کنید.\n🔸\n ریزالورها رو میتونید مستقیما از اسکنر موجود در داخل اپ اسکن کنید و ریزالورمناسب رو پیدا کنید.\n• نحوه اسکن و CIDR Block های  اپدیت شده  رو در کانال تلگرام میتونید پیدا کنید.\nلینک پروژه\nhttps://github.com/Starling226/vaydns-vpn\n📥\n دانلود با نت داخلی V8a\n📥\n دانلود با نت داخلی V7a\n@xsfilterrnet\n \n👑", "date": "2026-04-30 12:50:37"}, {"text": "بالا آوردن تمام کانال های تلگرام روی نت ملی با روش کاملا اختصاصی و امن\n@ConfigWireguard\n@xsfilterrnet", "date": "2026-04-30 14:28:29"}, {"text": "بالا آوردن تمام کانال های تلگرام روی نت ملی با روش کاملا اختصاصی و امن @ConfigWireguard @xsfilterrnet", "date": "2026-04-30 14:28:29"}, {"text": "⚡️\nخالق sni spoof و توضیخات پروژه جدید:\nیکی دیگر از کارهای فوق العاده انجام شده انتقال دیتا از طریق cloud storage ها هست که به طور ساده یعنی انتقال دیتا از طریق آپلود و دانلود فایلهایی که در واقع دیتا هستند. از آنجا که سرویسهای گوگل از جمله google drive با domain-fronting هم اکنون در دسترس است از این تکنیک میتوان برای دسترسی به اینترنت استفاده کرد. در مقایسه با روش master http relay میتوان مزایا و معایب زیر را بر شمرد:\nمزایا:\n۱. نیاز به mitm ندارد\n۲. تمامی سایتها درست و به صورت کامل لود میشوند\n۳. اگر با ریت مشخصی داده ها ارسال شوند مشکل محدود شدن اکانت پیش نخواهد آمد\n۴.  مشکل تحریم وجود ندارد و برای استفاده از هوش مصنوعی و به طور کلی تمامی کارهای روزمره که نیاز به سرعت بالا ندارند مناسب است\nمعایب:\n۱. نیاز به یک سرور خارجی وجود دارد (البته لزوما نیاز به داشتن ip ثابت ندارد)\n۲. سرعت پایینی دارد کمی بهتر از روش های dns ولی پایدار است.\n۳. سرعت لود ویدیو ها بر خلاف روش master پایین است\nحرفهای زیادی هم تو دلم بود ... بگذریم. \nبه امید روزی که تمام نخبگان ایرانی در ایرانی آزاد دور هم گرد هم آیند\nلینک پروژه:\nhttps://github.com/NullLatency/FlowDriver\nداخلی پروژه:\nhttps://storage.iran.liara.space/zarinplus/v1/2026-04-25/3b273ede716cd6a6c65be2985c26b7ca.zip\nتوییتر ایشون\n@xszapass\n \n👑", "date": "2026-04-24 22:25:11"}, {"text": "🥰\nآموزش نصب تانل به\n \nGoogle\nموارد نیاز:\nسرور خارج+ سیستم ویندوزی\nلینک داخلی\n:\n⚡️\nhttps://guardnet.ir/f/1c1e94d2925b\nپروژه:\nhttps://github.com/NullLatency/FlowDriver\nداستان پروژه\n@pingplas_channel\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-25 09:06:27"}, {"text": "⭐️\nمتدهایی که الان فعال هستن:\n1- \nمتد MHR\n✏️\n:\n⚪️\nرایگان و بدون پیش‌نیاز\n⚪️\n۲۰۰۰ ریکوئست محدودیت روزانه\n⚪️\nسختی راه‌اندازی: متوسط\n \n⚪️\n بدون تغییر آیپی(آیپی شما ایرانه)\n2- \nمتد FlowDrive\n💡\n:\n⚪️\nنیازمند یک عدد سرور خارج\n⚪️\n۱۰۰۰۰ ریکوئست محدودیت روزانه\n⚪️\nسختی راه‌اندازی: بالا\n⚪️\n با تغییر آیپی(به آیپی سرور خارج)\n@MatinSenPaii\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-25 18:38:32"}, {"text": "✈️\nانقدر درگیر وصل شدن بودیم که از آپدیت های مهم تلگرام جا موندیم:))\n ربات‌های تلگرام یه قابلیت قدرتمند جدید برای طراحی، استقرار و مقیاس‌پذیری دریافت کردن. این تغییر گویا به هر شخص اجازه می‌ده تا از پتانسیل هوش مصنوعی بهره‌برداری کنه و بدون کدنویسی، ربات بسازه. هرچند فعلا، ربات های ساده\n@MatinSenPaii\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-25 20:23:30"}, {"text": "📰\nتمامی متدهای \nDNS Tunneling\n این کانال با بهره بردن از دو سرور و مناسب کلاینت \nSlipNet\n، به‌صورت \n«کاملاً رایگان»\n در اختیار شماست.\n🚨\n \nمهم:\nبرای اتصال به کانفیگ‌ها، نیاز به وارد کردن \nUsername\n و \nPassword\n دارید، که به‌صورت \nروزانه\n داخل کانال قرار خواهند گرفت.\nعضویت در کانال، شما رو در اولویت اتصال قرار می‌ده.\nنصب اپلیکیشن اندروید کلاینت SlipNet و نحوه‌ی تنظیم پارامترها \n🚨\n مهم:\nبرای استفاده از کانفیگ‌ها، نیاز به \nDNS Resolver\n دارید، که با استفاده از آموزش‌های کانال، می‌تونید با توجه به نوع ارائه‌دهنده اینترنت و منطقه خود، اسکن کنید و بهترین ریزالورها رو برای استفاده در کانفیگ‌ها، به دست بیارید. \nآموزش نحوه‌ی اسکن DNS Resolver \nبرای مشاهده و برداشتن کانفیگ‌ها، لینک‌های زیر را لمس کنید. \n💡\n \nنکته:\nلزومی به وارد کردن تمامی کانفیگ‌ها(۴٢ کانفیگ) داخل اپلیکیشن ندارید؛ می‌تونید هر رکورد رو وارد کنید، با ریزالورهایی که به دست آوردید تست کنید و اگر برای شما جواب داد، از همون استفاده کنید. \n🗂\n \nکانفیگ‌های DNSTT Socks + SSH\n🗂\n \nکانفیگ‌های NoizDNS Socks + SSH\n🗂\n \nکانفیگ‌های Slipstream Socks + SSH\n🗂\n کانفیگ‌های \nVayDNS Socks + SSH\n به ترتیب نوع رکورد:\n▪️\n \nVayDNS - TXT - Socks + SSH\n▪️\n \nVayDNS - CNAME - Socks + SSH\n▪️\n \nVayDNS - A - Socks + SSH\n▪️\n \nVayDNS - AAAA - Socks + SSH\n▪️\n \nVayDNS - MX - Socks + SSH\n▪️\n \nVayDNS - NS - Socks + SSH\n▪️\n \nVayDNS - SRV - Socks + SSH\n▪️\n \nVayDNS - NULL - Socks + SSH\n▪️\n \nVayDNS - CAA - Socks + SSH\n#DNSTT\n#NoizDNS\n \n#slipstream\n#VayDNS\n@break_the_barriers\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-25 22:32:05"}, {"text": "🔐\nنسخه جدید اپلیکیشن V2rayn }, {"text": "عباس دوباره مذاکره کرده؟", "date": "2026-04-24 19:39:10"}, {"text": "در چند هفته اخیر در سفر به دور اروپا با اعضای پارلمان‌ها، دولت‌ها و رسانه‌ها گفت‌وگو کرده‌ام.\nسفر من یک هدف داشت: این که صدای میلیون‌ها ایرانی باشم که تحت سلطه جمهوری اسلامی، ترورهای آن و قطع اینترنت، گروگان گرفته شده‌اند؛ میلیون‌ها ایرانی که صدایشان خاموش شده است. \nاما اکنون با اطمینان می‌توانم بگویم این  سکوت، این سانسور، نه‌تنها توسط رژیم در ایران، بلکه توسط رسانه‌های بین‌المللی و به‌ویژه اروپایی انجام می‌شود.\nبنابراین، می‌خواهم به طور مستقیم با مردم اروپا صحبت کنم.\nI have spent the past several weeks traveling across Europe, speaking to members of parliaments, governments, and the press. \nMy visit had one objective: to give a voice to the millions of Iranians held hostage by the Islamic Republic, its terror, and its Internet blackout. The millions of Iranians who have been silenced. \nBut I can now say with confidence that that silencing, that censorship, is not just happening at the hands of the regime in Iran, but by the international, and particularly the European, media. \nSo I want to speak directly to the people of Europe.\n@OfficialRezaPahlavi", "date": "2026-04-24 20:16:51"}, {"text": "#یادآوری_شبانه یک روز دیگه هم گذشت و همچنان: کس ننه سه فاسد  به امید نابودی تمام و کمال جمهوری اسلامی شب خوش.", "date": "2026-04-24 20:43:55"}, {"text": "اگر یک ساعت نت فلسطین ، غزه ، لبنان و یمن و هر جای دیگه این تروریستها و تروریست پرور ها قطع شده بود چپ و اروپا و باقی دنیا خودشون رو گاییده بودن که وای جنایت شد وای فلان شد ولی برای ایران خفه خون مرگ گرفتن. سازمان های بین المللی هم که فقط نگران میشن یا آمار…", "date": "2026-04-24 20:56:16"}, {"text": "پیشنهاد من اینه که عطایش را به لقایش ببخشید و بیخیال FlowDrive بشید:) ارزش اعصاب خوردیش رو نداره حقیقتا، شانس مسدودی حساب گوگل هم همیشه وجود داره. پس از راه بی دردسر تر که همون MHR هست و نیازی به سرور نداره استفاده کنید.\nشما همین که بری توی گوگل کلود و بخوای ستاپ کنی و دسترسی‌ها رو بدی پیر میشی", "date": "2026-04-25 14:57:35"}, {"text": "اگر یک ساعت نت فلسطین ، غزه ، لبنان و یمن و هر جای دیگه این تروریستها و تروریست پرور ها قطع شده بود چپ و اروپا و باقی دنیا خودشون رو گاییده بودن که وای جنایت شد وای فلان شد ولی برای ایران خفه خون مرگ گرفتن. سازمان های بین المللی هم که فقط نگران میشن یا آمار…", "date": "2026-04-25 20:47:01"}, {"text": "در پی وقوع حادثه‌ای در جریان ضیافت شام انجمن خبرنگاران کاخ سفید، نیروهای سرویس مخفی دونالد ترامپ را از محل مراسم خارج کردند. گزارش‌ها حاکی است او و همسرش در سلامت کامل هستند.\nهمزمان، پس از انتشار گزارش‌هایی درباره تیراندازی در یکی از طبقات بالاتر هتل واشینگتن هیلتون ـ محل برگزاری مراسم ـ روند تخلیه ساختمان آغاز شده است. مجری شبکه فاکس‌نیوز اعلام کرد به نظر نمی‌رسد صدای تیراندازی از داخل سالن اصلی مراسم برخاسته باشد.\nتا این لحظه گزارشی از آسیب‌دیدگی احتمالی افراد حاضر در ضیافت منتشر نشده است. شبکه سی‌ان‌ان نیز گزارش داد اعضای هیئت دولت آمریکا در سلامت به سر می‌برند.\n@\nVahidOOnLine\nشنبه‌شب، پنجم اردیبهشت‌ماه، ضیافت سالانه انجمن خبرنگاران کاخ سفید در هتل «هیلتون» واشنگتن با وقوع شلیک گلوله به صحنه وحشت و آشوب تبدیل شد.\n در حالی که دونالد ترامپ و همسرش ملانیا تازه وارد سالن شده بودند، شنیده شدن صدای چندین شلیک متوالی باعث شد نیروهای سرویس مخفی به سرعت رئیس‌جمهوری را از صحنه خارج کنند.\n همزمان با تخلیه مقامات ارشد از جمله جی‌دی ونس، پیت هگست و مارکو روبیو، نیروهای مسلح گارد ویژه با تجهیزات کامل وارد سالن شده و روی صحنه مستقر شدند.\nتصاویر ویدئویی منتشر شده از داخل سالن، خبرنگاران و میهمانان برجسته را نشان می‌دهد که در میان فریادهای «روی زمین بخوابید!» به زیر میزها پناه برده‌اند.\nشاهدان عینی از شنیده شدن ۵ تا ۸ صدای شلیک در نزدیکی میز خبرنگاران «سی‌بی‌اس» خبر داده‌اند.\nاگرچه گزارش‌های اولیه از بازداشت یک مظنون حکایت دارد، اما هنوز از انگیزه دقیق ضارب و تلفات احتمالی جزئیاتی منتشر نشده است.\nکاخ سفید اعلام کرد که حال رئیس‌جمهور و همراهانش خوب است و به مکان امن منتقل شده‌اند.\n@\nVahidOOnLine\n🔄\n آپدیت:\n|رئيس جمهوری آمریکا دقایقی قبل تائید کرد که در مراسم شام انجمن خبرنگاران کاخ سفید ۲۰۲۶ تیراندازی شد.\nآقای ترامپ در پیامی در شبکه اجتماعی تروت‌سوشال نوشت «شبی خاص در واشنگتن دی.سی. سرویس مخفی و نیروهای انتظامی کار فوق‌العاده‌ای انجام دادند. آن‌ها سریع و شجاعانه عمل کردند. تیرانداز دستگیر شده است.»\nاو گفت «من پیشنهاد کرده‌ام که اجازه دهیم مراسم ادامه پیدا کند، اما تصمیم‌گیری کاملاً بر اساس نظر نیروهای انتظامی خواهد بود.»\nآقای ترامپ افزود: «آن‌ها به‌زودی تصمیم خواهند گرفت. صرف‌نظر از آن تصمیم، شب بسیار متفاوت از برنامه‌ریزی خواهد بود و ما مجبوریم دوباره آن را برگزار کنیم.»\n@\nVahidHeadline\n \nپست دیگر ترامپ، ترجمه ماشین:\nنیروهای انتظامی، مطابق پروتکل، از ما خواسته‌اند محل را ترک کنیم و ما نیز فوراً این کار را انجام خواهیم داد. من تا ۳۰ دقیقه دیگر در اتاق نشست خبری کاخ سفید کنفرانس خبری برگزار خواهم کرد. بانوی اول، به‌همراه معاون رئیس‌جمهور و همه اعضای کابینه، در سلامت کامل هستند. نیم ساعت دیگر با شما صحبت خواهیم کرد. من با همه نمایندگان مسئول این رویداد گفت‌وگو کرده‌ام و این برنامه ظرف ۳۰ روز آینده دوباره زمان‌بندی خواهد شد.\nرئیس‌جمهور دونالد جی. ترامپ\nrealDonaldTrump\n \n📡\n \n@VahidOnline", "date": "2026-04-26 04:28:44"}, {"text": "تصاویری که ترامپ بدون هیچ توضیحی منتشر کرده و به نظر می‌رسه عامل واقعه امشب رو نشون میده.\nrealDonaldTrump\nخبرنگار نیویورک‌پست هویت عامل تیراندازی در ضیافت شام خبرنگاران کاخ سفید را مردی ۳۱ ساله به نام «کول توماس آلن» (Cole Tomas Allen) گزارش کرد.\nبراساس این گزارش، او اهل تورنس ایالت کالیفرنیا است که بلافاصله پس از حادثه توسط نیروهای امنیتی دستگیر شده و در حال حاضر در بازداشت به سر می‌برد.\n@\nVahidOOnLine\n📡\n \n@VahidOnline", "date": "2026-04-26 04:28:44"}, {"text": "باو با سیمکارت پرو ات رخ عقاب نگیر ... \nبه جا نون بهت آشغال میدن خوشحالی ؟! الحق گشنه گدایی", "date": "2026-04-22 08:29:07"}, {"text": "باو با سیمکارت پرو ات رخ عقاب نگیر ...   به جا نون بهت آشغال میدن خوشحالی ؟! الحق گشنه گدایی", "date": "2026-04-22 08:29:45"}, {"text": "این سطح از فیلترینگ دیگه به آخوند بر نمی‌گرده. به عشق آخوند بر می‌گرده. شما مستعان رو داده بودی دست آخوند می‌گفتی فیلترینگ همینه، همین بودجه رو بهت داده بود. خوش‌رقصی اضافی ابتکار خودتون بوده دیگه.\n@Dirty_Kids\n \n👻", "date": "2026-04-22 09:09:56"}, {"text" ته است.\nقابلیت YouTube via Relay: اضافه شدن گزینه‌ای برای حل مشکل \"Video Unavailable\" در یوتیوب با استفاده از رله‌های اختصاصی.\nامنیت بالاتر: جلوگیری از نشت IP (IP Leak Protection) با استفاده از پچ‌های امنیتی جدید و پاکسازی خودکار هدرها.\nرابط کاربری شیشه‌ای (Glassmorphic): طراحی مدرن و جدید نوار منو (MenuBar) با وضعیت اتصال رنگی (Cyan) و پایش لحظه‌ای سلامت سرور.\nبهینه‌سازی چیدمان: دسترسی سریع‌تر به تنظیمات SOCKS5 و حذف موارد گیج‌کننده در منوها.\n💻\n پلتفرم: macOS\nhttps://github.com/g3ntrix/Shade/releases/tag/v1.3.2", "date": "2026-05-02 00:10:16"}, {"text": "برای متود MHR+CFW میتونید از همون MHRV-RS هم استفاده کنید.\nMasterHttpRelayVPN-RUST\nhttps://github.com/therealaleph/MasterHttpRelayVPN-RUST/releases\nبرای Worker کلودفلر\nhttps://github.com/therealaleph/MasterHttpRelayVPN-RUST/blob/main/assets/cloudflare/worker.js\nبرای Apps Script گوگل\nhttps://github.com/therealaleph/MasterHttpRelayVPN-RUST/blob/main/assets/apps_script/Code.cfw.gs\n@whitedns", "date": "2026-05-02 00:13:56"}, {"text": "یه اپلیکیشن باحال برای مک بوک داریم به اسم \n#FireWally\n، مصرف اینترنت هر اپ رو دقیق نشون میده و حتی میتونیم دسترسی یه برنامه به اینترنت رو کامل مسدود کنیم.\nhttps://apps.apple.com/us/app/firewally-ai-firewall-app/id6744357438?mt=12\n@whitedns", "date": "2026-05-02 00:17:53"}, {"text": "🛑\nMasterDNSVPN-GG\n🛑\n \nنحوه وصل شدن برای افراد مبتدی\nنسخه: 1.0.5\nاگه کانفیگ مستر فایل بود جاهای دیگه اصلا نیازی نیست دامین (Domain) و (Encryption Key) رو تغییر بدین فقط اضافه کنید\nاگه کانفیگ مستر متن بود طبق همین ویدیو میتونید انجام بدین\n(بخاطر اینکه روی تنظیماتی قرار داده شده که بهترین اتصال و پایداری رو داشته باشین مگرنه میگفتیم دستی وارد کنید)\nنکته مهم: احتمال 99 درصد با این ریزالور ها(resolvers) وصل نشین بخاطر اینکه عمومی شدن\nپیشنهاد: از جاهای دیگه هم به دنبال ریزالور مختص مستر دی ان اس باشین بدونین که هرچقدر کمتر عمومی باشه شانس وصل شدن شما بیشتر میشه\nکانفیگ هم باید هر از چند گاهی عوض کنید اگه اختصاصی ندارین\nدر صورت امکان چندتا کانفیگ تست کنید ممکنه بعضی ها سرعت بهتری داشته باشن\n@MasterDnsManager_bot\n \nباتی که باهاش کانفیگ تهیه شد\nپروکسی تلگرام که باهاش با مستر وصل شد\nممکنه زمان بر باشه متصل شدن حتی چند دقیقه\nhttps://t.me/socks?server=127.0.0.1&port=18000\nآموزش بیشتر در\n@WhiteDNS", "date": "2026-05-02 07:29:21"}, {"text": "سلام به همه دوستان \n🌐\nبرای دریافت آخرین آپدیت‌ها، آموزش‌ها و اطلاعیه‌های مهم خارج از تلگرام، حتماً اکانت جدید ما در X رو دنبال کنید:\n🔗\n \nhttps://x.com/WhiteDNS_Team\n@WhiteDNS", "date": "2026-05-02 08:39:45"}, {"text": "🔴\n🔴\n🔴\n هشدار بحرانی برای مدیران سایت ها در ایران - آسیب‌پذیری cPanel (CVE-2026-41940)\nیه آسیب‌پذیری بحرانی تو cPanel کشف شده که به مهاجم اجازه میده بدون هیچ پسوردی، دسترسی کامل root به سرور شما بگیره!\nاگه هنوز پچ نکردید، سرورتون در معرض خطر جدیه. همین الان بکاپ بگیرید و اقدامات زیر رو انجام بدید.\nهاستینگ‌های داخل ایران به دلیل محدودیت‌های اینترنتی در واکنش سریع به این بحران با مشکل مواجه‌ان — پس خودتون پیش‌قدم بشید!\n⚠️\n جزئیات اکسپلویت:\n • CVE: CVE-2026-41940 | CVSS Score: 9.8/10 (بحرانی)\n • نوع حمله: Authentication Bypass از طریق CRLF Injection\n • نحوه حمله: مهاجم با یک لاگین ناموفق، یک session cookie می‌سازه. بعد با دستکاری هدر HTTP، مقدار user=root رو داخل فایل session سرور تزریق می‌کنه — بدون نیاز به پسورد، root shell می‌گیره\n • اکسپلویت از اواخر فوریه ۲۰۲۶ به صورت zero-day در حال استفاده بوده\n • در حال حاضر ۴۴,۰۰۰ آی‌پی در حال اسکن و اکسپلویت سرورهای آسیب‌پذیر هستن\n • یک ابزار اکسپلویت عمومی به نام cPanelSniper هم منتشر شده\n✅\n اقدامات فوری:\n 1. آپدیت به نسخه \n11.136.0.5\n یا بالاتر\n 2. اجرای دستور patch اضطراری:\n/scripts/upcp --force\n 3. لاگ‌های تاریخ ۲۸ آوریل تا الان رو بررسی کنید\n 4. پورت‌های 2083 و 2087 رو موقتاً ببندید\n📚\n منابع:\n🔗\n The Hacker News:\nhttps://thehackernews.com/2026/04/critical-cpanel-authentication.html\n🔗\n Rapid7 (جزئیات فنی):\nhttps://www.rapid7.com/blog/post/etr-cve-2026-41940-cpanel-whm-authentication-bypass/\n🔗\n watchTowr Labs (تحلیل کامل exploit):\nhttps://labs.watchtowr.com/the-internet-is-falling-down-falling-down-falling-down-c لی وصل می‌مونه و ممکنه بعداً دردسر بشه. \nروش سوم با Netlify CLI: برای کسانی که راحت با ترمینال کار می‌کنن.\nروش اول رو توضیح میدم چون بهترینه توام همین رو برو:\nفایل پروژه زیر رو دانلود کن و ذخیره کن و از حالت زیپ خارج کن.\nبرو به سایت \nNetlify.com\n.\nفایل پروژه رو Import کن.\nBuild command رو بذار: npm run build\nPublish directory رو بذار: public\nمتغیر TARGET_DOMAIN رو اضافه کن. (گزینه project configuration بزن و بعد روی Environment variables کلیک کن، و بعد Add variable بزن، اینجا key رو TARGET_DOMAIN وارد کن و مقدار Value هم بزار آدرس سرور خودت)\nدوباره Deploy بزن.\nصبر کن تا Deploy کامل تموم بشه\nبرو به بخش Deploys\nمطمئن شو که آخرین Deploy وضعیت Published (سبز) داره.\nدامنه سایتت رو پیدا کن\nبالای صفحه سایتت در Netlify، یک آدرس مثل این نوشته:\nhttps://xxxxxxxxx.netlify.app\nاین آدرس دامنه اصلی ریلی تو هست. کپی‌اش کن.\n برو Edge Function چک کن درست کار می‌کنه یا نه\nاز منوی سمت چپ برو قسمت Logs & metrics و بعد روی Edge Functions کلیک کن.\nباید یک فانکشن به اسم relay ببینی.\nروی آن کلیک کن و لاگ‌ها را ببین (نباید لاگ و خطا داشته باشه).\nحالا چطور استفاده کنیم؟\nفرض کن دامنه‌ت شد: \nhttps://xxxxxxxx.netlify.app\nهر چیزی که به این دامنه بفرستی، به سرور اصلی‌ت (که در TARGET_DOMAIN گذاشتی) منتقل می‌شه.\nقدم بعدی کانفیگ VLESS (XHTTP)؛\nاین کانفیگ رو کپی کن و در v2ray پیست کن: در این کانفیگ، به‌جای 00000 ها UUID سرور خودتون و به‌جای xxxxxxx ها در قسمت هاست دامنه نتلیفای رو وارد کنید.\nvless://00000000-0000-0000-0000-000000000000@kubernetes.io:443?mode=auto&path=%2Fyourpath&security=tls&alpn=h2%2Chttp%2F1.1&encryption=none&insecure=0&host=xxxxxxx.netlify.app&fp=chrome&type=xhttp&allowInsecure=0&sni=kubernetes.io#Netlify%E2%80%93xhttp%20%40TheVPNMethod\n@TheVPNMethod\n \n💎\n@xsfilterrnet\n \n👑", "date": "2026-04-30 12:52:03"}, {"text": "سرور دیگه روح جنگلی \n [dnstt-socks] filterchi\n    slipnet://MjJ8ZG5zdHR8ZG5zdHQtc29ja3N8dC5rbWpwZmlsdGVyY2hpLnNob3B8OC44LjguODo1MzowfDB8NTAwMHxiYnJ8MTA4MHwxMjcuMC4wLjF8MHw3OGZmOTUxNWYzZmJkODMxOWY3YjM3YjAwOGVlMTdlODlkZmU3YTFlMTExYjQyM         function renderMessages(channelName) {
            const container = document.getElementById('messagesContainer');
            const countBadge = document.getElementById('messageCount');
            if (!channelName || !channelData[channelName]) {
                container.innerHTML = '<div class="error-message">⚠️ لطفاً یک کانال معتبر انتخاب کنید.</div>';
                countBadge.textContent = '';
                return;
            }
            const data = channelData[channelName];
            if (data.status === 'error') {
                container.innerHTML = '<div class="error-message">❌ ' + escapeHtml(data.error) + '</div>';
                countBadge.textContent = 'خطا در دریافت';
                return;
            }
            const messages = data.messages;
            if (!messages.length) {
                container.innerHTML = '<div class="error-message">⚠️ هیچ پیامی برای این کانال یافت نشد.</div>';
                countBadge.textContent = '۰ پیام';
                return;
            }
            countBadge.textContent = '📨 ' + messages.length + ' پیام';
            let html = '';
            for (let i = 0; i < messages.length; i++) {
                let msg = messages[i];
                let text = escapeHtml(msg.text).replace(/\n/g, '<br>');
                text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
                html += '<div class="message">' +
                        '<div class="date">🕒 ' + escapeHtml(msg.date) + '</div>' +
                        '<div class="text">' + text + '</div>' +
                        '</div>';
            }
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const selectEl = document.getElementById('channelSelect');
        selectEl.addEventListener('change', (e) => renderMessages(e.target.value));
        if (selectEl.options.length > 1) {
            selectEl.selectedIndex = 1;
            renderMessages(selectEl.value);
        }
    
    </script>
    </body>
    </html>
