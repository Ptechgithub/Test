name: Fetch Telegram Channel Messages

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کاربری کانال تلگرام (مثلاً @example) یا آیدی عددی'
        required: true
        default: '@my_channel'
      api_id:
        description: 'api_id از my.telegram.org (در صورت نداشتن، از secrets استفاده می‌شود)'
        required: false
      api_hash:
        description: 'api_hash از my.telegram.org (در صورت نداشتن، از secrets استفاده می‌شود)'
        required: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon

      - name: Fetch messages and generate HTML
        env:
          TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
          API_ID: ${{ github.event.inputs.api_id || secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ github.event.inputs.api_hash || secrets.TELEGRAM_API_HASH }}
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          python - <<EOF
          import os, asyncio, html
          from datetime import datetime
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          async def main():
              string_session = os.environ['TELEGRAM_STRING_SESSION']
              api_id = int(os.environ['API_ID'])
              api_hash = os.environ['API_HASH']
              channel = os.environ['CHANNEL']

              # 关键：使用 StringSession
              client = TelegramClient(StringSession(string_session), api_id, api_hash)
              await client.start()
              
              # 获取消息
              messages = []
              async for msg in client.iter_messages(channel, limit=50):
                  if msg.text:
                      messages.append({
                          'date': msg.date.strftime('%Y-%m-%d %H:%M:%S'),
                          'text': html.escape(msg.text)
                      })
              
