حاصره‌ی کنونی به‌قدری مؤثر بوده که حتی بدون توافق و صرفاً با ادامه‌ی فشار، آمریکا برنده است. به باور او، اگر همین امروز هم آمریکا میدان را ترک کند، بازسازی ایران دو دهه طول خواهد کشید.\nدر بُعد داخلی و حقوقی، ترامپ به‌صراحت گفت برای تمدید درگیری از کنگره مجوز نخواهد گرفت و قانون اختیارات جنگی را — به استناد رویه‌ی رؤسای جمهور پیشین — خلاف قانون اساسی خواند. در بُعد بین‌المللی، از ایتالیا و اسپانیا به‌سبب اغماض درباره‌ی برنامه‌ی هسته‌ای ایران انتقاد کرد و هسته‌دار شدن ایران را خط قرمز و فاجعه‌ی جهانی توصیف نمود. درباره‌ی پاکستان و گزارش گشوده شدن خزانه‌های بانکی‌اش به روی ایران گفت در جریان است، و سفر معوق‌مانده‌اش به چین را نیز ظرف دو هفته‌ی آینده وعده داد. نگرانی پنتاگون درباره‌ی اتمام موجودی مهمات در عملیات «خشم حماسی» را قاطعانه رد کرد.\nدر ارزیابی اولیویا رینالدی از کاخ سفید، چند نکته برجسته شد: نخست، تناقض میان زبان «آمادگی برای توافق» در تهران و رد آن از سوی ترامپ؛ دوم، گریز ترامپ از مجوز کنگره پس از سپری‌شدن شصت‌روزِ مقرر در قانون اختیارات جنگی، که حتی در میان جمهوری‌خواهان نگرانی ایجاد کرده است؛ سوم، شکاف میان رقم رسمی پنتاگون (۲۵ میلیارد دلار) و برآورد گزارش‌های میدانی (نزدیک به ۵۰ میلیارد دلار) برای هزینه‌ی این شصت روز؛ و در نهایت، اعتراف ضمنی ترامپ به بالا بودن قیمت بنزین در بالاترین سطح چهارساله، با این وعده که پایان جنگ و «جهان بدون ایرانِ هسته‌ای» قیمت‌ها را فرو خواهد ریخت.\nنکات جالبی در این مصاحبه بود. بیشتر صبر میکنیم\n😊\n.\n@daneshagahi", "date": "2026-05-01 20:16:42"}, {"text": "مخاصماتی که در ۲۸ فوریه ۲۰۲۶ آغاز شده بود، خاتمه یافته است.\nبا وجود موفقیت عملیات‌های ایالات متحده علیه رژیم ایران و تلاش‌های مستمر برای دستیابی به صلحی پایدار، تهدیدی که ایران متوجه ایالات متحده و نیروهای مسلح ما می‌سازد همچنان قابل‌توجه باقی مانده است. بر همین اساس، وزارت جنگ همچنان به‌روزرسانی آرایش نیروهای خود در حوزه‌ی مسئولیت را، به‌گونه‌ای که لازم و مقتضی باشد، ادامه می‌دهد تا با تهدیدات نیروهای ایران و نیروهای نیابتی ایران علیه ایالات متحده و متحدان و شرکایش مقابله کند. این تغییرات به‌طور کامل‌تر در ضمیمه‌ی طبقه‌بندی‌شده‌ی این نامه تشریح شده است.", "date": "2026-05-01 20:27:46"}, {"text": "به‌زودی طرحی را که ایران همین حالا برای ما فرستاده بررسی خواهم کرد، اما نمی‌توانم تصور کنم که قابل پذیرش باشد، چرا که آنها هنوز برای کاری که طی ۴۷ سال گذشته در حق بشریت و جهان روا داشته‌اند، بهایی به‌اندازه‌ی کافی سنگین نپرداخته‌اند. از توجه شما به این موضوع سپاسگزارم!\nI will soon be reviewing the plan that Iran has just sent to us, but can’t imagine that it would be acceptable in that they have not yet paid a big enough price for what they have done to Humanity, and the World, over the last 47 years. Thank you for your attention to this matter! President DONALD J. TRUMP\n \nhttps://truthsocial.com/@realDonaldTrump/116507414650995614\nدادی روبیو برات نوشته؟ از این حرفا اصلا بهت نمیخوره‌ها\n😏\n@daneshagahi", "date": "2026-05-03 05:56:09"}, {"text": "داده‌های تحرکات نظامی (تمرینی-آرایشی-ترابری) در کنار جریان داده‌های حاوی نویز کمتر، احتمال آغاز مرحله‌ی دوم اقدام نظامی علیه گروه‌ک جمهوری‌اسلامی رو جدی‌تر نشون میده‌.\n@daneshagahi", "date": "2026-05-03 09:26:27"}, {"text": "داده‌های لایو فعلی فلایت رادار که نشان دهنده‌ی \nپرواز 14 سوخت رسان آمریکایی بر فراز اسرائیل تا خلیج فارس\n به شکل کرویدور هست یک مورد واقعا قابل توجه بود. \nحدس میزنم یک تمرین هست برای اقدام احتمالی \nروی جزایر و نوار جنوبی\n. هیچ توضیح دیگه ای به ذهنم نمیرسه که این تعداد با این شکل با ترانسپوندر روشن رو بشه تشریح کرد.\nولی هرچی که هست به نظرم برای یک رفتار جدی هست. \n@daneshagahi", "date": "2026-05-03 16:57:40"}, {"text": "متنی که ترامپ منتشر\n کرده در مورد اینکه از فردا میخواد کشتی‌هایی که در تنگه‌ی هرمز گیر کردن رو نجات بده بسیار شبیه آغاز یک ماجراجویی با گروهک جمهوری‌اسلامی هستش.\nدر واقع میخواد این گروهک رو تحریک کنه که یک بهانه‌ی جدی بدن دست‌ش که برای همه دهن‌پر کن باشه. همه جوره در حدی که ادعا کنه اینا حتی جلوی اقدام انسان‌دوستانه رو هم گرفتن و به ما هم حمله کردن و تازه داریم از خودمون دفاع می‌کنیم و...\nبخش صحبت‌هاش در مورد مذاکرات هم که شعری بی‌وزن و قافیه بیش نبود مثل همیشه. همین الان شکاف بین دو جهان این دوتا جوری جر خورده که با نخ گونی هم نمیشه بخیه‌ش کرد.\nتح . این درگیری از طریق پهپادها و موشک‌ها حل‌وفصل نخواهد شد.»\nhttps://iranintl.com/202605057242", "date": "2026-05-05 04:10:58"}, {"text": "سرخط خبرهای سه‌شنبه ۱۵ اردیبهشت\n@iranintltv", "date": "2026-05-05 04:19:27"}, {"text": "مارک کارنی، ‌نخست‌وزیر کانادا،‌ با انتشار پستی در شبکه اجتماعی ایکس، حمله روز دوشنبه جمهوری اسلامی به امارات متحده عربی را به‌شدت محکوم کرد و خواستار کاهش تنش و پیشبرد دیپلماسی در منطقه شد.\nنخست‌وزیر کانادا گفت: «ما در همبستگی با محمد بن زاید و مردم امارات متحده عربی ایستاده‌ایم و تلاش‌های دفاعی برای حفاظت از غیرنظامیان و زیرساخت‌های غیرنظامی را تحسین می‌کنیم.»\nhttps://iranintl.com/202605057899", "date": "2026-05-05 04:21:24"}, {"text": "شورای سردبیری روزنامه وال‌استریت ژورنال، در یادداشتی با اشاره به حمله روز دوشنبه ۱۴ اردیبهشت جمهوری اسلامی به امارات متحده عربی نوشت تهران آتش‌بس را نقض کرده و دونالد ترامپ، رییس‌جمهوری آمریکا، باید به این اقدام پاسخ دهد و با توسل به زور تنگه هرمز را باز کند.\nشورای سردبیری وال‌استریت ژورنال نوشت آتش‌بس در خلیج فارس شکسته شده و مقصر آن حکومت ایران است. رییس‌جمهوری ترامپ اکنون باید تصمیم بگیرد که چگونه قصد دارد تنگه هرمز را بازگشایی کند: آیا در مذاکرات آنچه را تهران می‌خواهد بدهد یا از نیروی نظامی آمریکا برای عبور کشتی‌ها استفاده کند.\nروز یک‌شنبه، ترامپ طرح «پروژه آزادی» را برای هدایت کشتی‌های تجاری از تنگه اعلام کرد. این طرح که به‌عنوان یک ماموریت انسانی برای کمک به کشتی‌ها و خدمه‌ای که به‌اجبار در خلیج فارس گرفتار شده‌اند معرفی شد، در عین حال یک اقدام تاکتیکی برای شکستن محاصره اعمال‌شده از سوی جمهوری اسلامی و بازگرداندن جریان انرژی نیز بود.\nhttps://iranintl.com/202605053365", "date": "2026-05-05 04:27:47"}, {"text": "کریستالینا جورجیوا، مدیرعامل صندوق بین‌المللی پول، هشدار داد که تورم از همین حالا در حال افزایش است و در صورتی که جنگ در خاورمیانه تا سال ۲۰۲۷ ادامه پیدا کند و قیمت نفت به حدود ۱۲۵ دلار در هر بشکه برسد، اقتصاد جهانی می‌تواند با وضعیت بسیار وخیم‌تری روبه‌رو شود.\nاو گفت ادامه جنگ به این معناست که «سناریو مرجع» این نهاد دیگر قابل تحقق نیست. براساس این سناریو فرض بر آن بود که درگیری کوتاه‌مدت باشد و رشد اقتصادی جهانی تنها اندکی به ۳.۱ درصد کاهش یابد و تورم کمی به ۴.۴ درصد افزایش پیدا کند.\nمدیرعامل صندوق بین‌المللی پول گفت که ادامه جنگ، پیش‌بینی قیمت نفت در حدود یا بالاتر از ۱۰۰ دلار برای هر بشکه، و افزایش فشارهای تورمی به این معناست که «سناریو بدبینانه» صندوق بین‌المللی پول عملاً در حال تحقق است.\nhttps://iranintl.com/202605054960", "date": "2026-05-05 04:33:33"}, {"text": "خبرگزاری رویترز به‌نقل از سه منبع آگاه گزارش داد که ارزیابی‌های اطلاعاتی ایالات متحده نشان می‌دهد مدت زمانی که جمهوری اسلامی برای ساخت یک سلاح هسته‌ای نیاز دارد، از تابستان گذشته تغییری نکرده است.\nدر آن هنگام و پس از جنگ ۱۲ روزه تحلیلگران برآورد کرده بودند حمله آمریکا و اسرائیل این جدول زمانی را تا حدود یک سال به عقب رانده است.\nبه‌گفته این منابع، ارزیابی‌ها از برنامه هسته‌ای تهران حتی پس از دو ماه جنگی که دونالد ترامپ، رییس‌جمهوری آمریکا، تا حدی با هدف جلوگیری از دستیابی جمهوری اسلامی به بمب هسته‌ای آغاز کرد، در مجموع بدون تغییر باقی مانده است.\nحملات اخیر آمریکا و اسرائیل که از ۹ اسفند آغاز شد، عمدتا بر اهداف نظامی متعارف متمرکز بوده، هرچند اسرائیل شماری از تاسیسات مهم هسته‌ای را هدف قرار داده است.\nثابت ماندن این جدول زمانی نشان می‌دهد که برای ایجاد اختلال جدی در برنامه هسته‌ای تهران، احتمالا لازم است ذخایر باقی‌مانده اورانیوم با غنای بالا، نابود یا از ایران خارج شود.\nhttps://iranintl.com/202605059199", "date": "2026-05-05 04:44:27"}, {"text": "اطلاعات اختصاصی رسیده به ایران‌اینترنشنال نشان‌دهنده اوج‌گیری بی‌سابقه تنش میان دولت و فرماندهان نظامی است. بر اساس اطلاعات دریافتی، مسعود پزشکیان به‌شدت از اقدامات احمد وحیدی، فرمانده سپاه پاسداران، خشمگین است.\nگفت‌وگو با کامیار بهرنگ، عضو تحریریه ایران‌اینترنشنال\n@iranintltv", "date": "2026-05-05 05:05:11"}, {"text": "حال‌وش گزارش داد یک زن بلوچ ۳۳ ساله در سراوان به نام مهسا براهویی که در منزل خود به دست شوهرش مورد ضرب‌و جرح قرار گرفته و به آتش کشیده شد بود، پس از دو روز بر اثر شدت بالای سوختگی درگذشت. نیروهای انتظامی همسر این زن را بازداشت کرده‌اند.\nطبق این گزارش، حوالی ساعت ۹ شب دهم اردیبهشت‌ماه، همسر مهسا در حالی‌که اقدام به مصرف مو xt": "انجمن فین‌تک در بیانیه خود استدلال کرد که رویکرد ایجاد اینترنت طبقاتی، گره‌ای از مشکلات زیرساختی باز نمی‌کند و در عوض، اعتماد عمومی و پیکره اقتصاد دیجیتال را با آسیبهای جبران‌ناپذیری مواجه خواهد ساخت.\nاین انجمن از نهادهای تصمیم‌گیر، به ویژه وزارت ارتباطات و شورای عالی فضای مجازی، خواسته که به جای تعریف طرح‌های تبعیض‌آمیز، بر بازگرداندن کیفیت به کل شبکه اینترنت کشور و صیانت از حقوق کاربران تمرکز کنند. /دیجیاتو\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 05:21:24"}, {"text": "بی‌بی‌سی در گزارشی گفته که شبکه‌ای مخفی در حال قاچاق تجهیزات اینترنت ماهواره‌ای استارلینک به داخل ایرانه، تا کاربران بتونن محدودیت‌های شدید اینترنت رو دور بزنن.\nدر این گزارش اومده که افرادی در خارج از کشور این دستگاه‌ها رو تهیه کرده و بصورت پنهانی وارد ایران می‌کنن، تا دسترسی به اینترنت آزاد فراهم بشه.\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 05:23:55"}, {"text": "در شصت و ششمین روز از قطع سراسری اینترنت هستیم!\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 05:29:39"}, {"text": "اپ TeleMirror یه تلاش آزمایشی برای دریافت آخرین مطالب کانال تلگرام خودم و سایر کانال‌های موردنظر در شرایط محدودیت شدید اینترنته، که سعی می‌کنه با چند روش مختلف پست‌ها رو بگیره و نمایش بده. \nاین برنامه رایگان و متن‌بازه و فعلا می‌تونه برای دنبال کردن اخبار تلگرامی بدون نیاز به فیلترشکن، یه گزینه موقت و کاربردی واسه دسکتاپ باشه.\n👉\n \ngithub.com/ircfspace/teleMirror/releases/latest\n💡\n \nt.me/PersianGithubMirror/4128\n۱. این برنامه رو برای کانال خودم نوشتم که در لیست بصورت دیفالت وجود داره، ولی هرکی میتونه سایر کانال‌های موردنظرش رو وارد کنه\n۲. برای اینکه ریت‌لیمیت نخورین پست‌هارو برای مدت کوتاهی کش میکنه، که با هربار مراجعه یک درخواست به سمت تلگرام ارسال نشه\n۳. به وایت‌لیست فعلی اینترنت متکی هست و فیلترشکن نیست. ممکنه روی بعضی از اپراتورها جواب نده، یا خیلی زود از کار بندازنش\n۴. برنامه دیتارو از کانال‌های پابلیک میگیره و به هیچ اطلاعات شخصی‌ای واسه تلگرام نیاز نداره\n۵. در حال حاضر نسخه ویندوزش رو منتشر کردم، اما اگر بازخوردها مثبت باشه برای مک و لینوکس هم ارائه میشه.\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 16:23:22"}, {"text": "دیجی‌کالا خیلی اوقات در رابطه با خسارت‌هایی که بصورت مستقیم و غیرمستقیم به مشتریان و تامین‌کنندگان وارد میکنه پاسخگو نیست، اما در شرایط جنگی از طرف سرویس دیجی‌پی بخاطر ۲۰ روز تاخیر در پرداخت قسط اظهارنامه قضائی میفرسته؟\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 18:27:14"}, {"text": "خبری که امروز در مورد \"ثبت رکورد ژاپن در رابطه با سرعت اینترنت\" در صفحات مختلف منتشر شده، مربوط به حدود ۹ ماه قبل هست.\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 18:45:28"}, {"text": "کاربران میگن ابلاغیه‌های مشابهی رو از قوه قضائیه با موضوع \"پرداخت وجه و تسویه اقساط\" \nدریافت کردن\n، که توسط \"نوآوران پرداخت مجازی ایرانیان\"، یعنی نام تجاری دیجی‌پی (زیرمجموعه دیجی‌کالا) ارسال شده.\nبا توجه به اینکه ثبت اظهارنامه آنلاین از طریق سامانه عدل‌ایران امکان پذیره، احتمالا تعداد نفراتی که پیام‌های مشابهی گرفتن اندک نباشه!\n🔗\n \nᴡᴇʙꜱɪᴛᴇ\n • \nᴠᴘɴʜᴜʙ\n • \nɢɪᴛʜᴜʙᴍɪʀʀᴏʀ\n@ircfspace", "date": "2026-05-04 18:54:14"}]}};

        function renderMessages(channelName) {
            const container = document.getElementById('messagesContainer');
            const countBadge = document.getElementById('messageCount');
            if (!channelName || !channelData[channelName]) {
                container.innerHTML = '<div class="error-message">⚠️ لطفاً یک کانال معتبر انتخاب کنید.</div>';
                countBadge.textContent = '';
                return;
            }
            const data = channelData[channelName];
            if (data.status === 'error') {
                container.innerHTML = '<div class="error-message">❌ ' + escapeHtml(data.error) + '</div>';
                countBadge.textContent = 'خطا در دریافت';
                return;
            }
            const messages = data.messages;
            if (!messages.length) {
                container.innerHTML = '<div class="error-message">⚠️ هیچ پیامی برای این کانال یافت نشد.</div>';
                countBadge.textContent = '۰ پیام';
                return;
            }
            countBadge.textContent = '📨 ' + messages.length + ' پیام';
            let html = '';
            for (let i = 0; i < messages.length; i++) {
                let msg = messages[i];
                let text = escapeHtml(msg.text).replace(/\n/g, '<br>');
                text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
                html += '<div class="message">' +
                        '<div class="date">🕒 ' + escapeHtml(msg.date) + '</div>' +
                        '<div class="text">' + text + '</div>' +
                        '</div>';
            }
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const selectEl = document.getElementById('channelSelect');
        selectEl.addEventListener('change', (e) => renderMessages(e.target.value));
        if (selectEl.options.length > 1) {
            selectEl.selectedIndex = 1;
            renderMessages(selectEl.value);
        }
    
    </script>
