name: Fetch Telegram Channel Messages (Web Scraping)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: '   (: example  @example)'
        required: true
        default: 'my_channel'
      limit:
        description: '    ( )'
        required: false
        default: '50'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch messages and generate HTML
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python - <<EOF
          import os, re, time, html, requests
          from bs4 import BeautifulSoup
          from datetime import datetime

          os.makedirs("telegram", exist_ok=True)

          def clean_channel(ch):
              ch = ch.strip()
              if ch.startswith('@'):
                  ch = ch[1:]
              return ch

          def fetch_page(channel, before=None):
              url = f"https://t.me/s/{channel}"
              if before:
                  url += f"?before={before}"
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              resp = requests.get(url, headers=headers, timeout=10)
              resp.raise_for_status()
              return resp.text

          def parse_messages(html_content):
              soup = BeautifulSoup(html_content, 'html.parser')
              messages = []
              for msg_div in soup.find_all('div', class_='tgme_widget_message'):
                  text_elem = msg_div.find('div', class_='tgme_widget_message_text')
                  if not text_elem:
                      continue
                  text = text_elem.get_text(separator='\n').strip()
                  if not text:
                      continue
                  date_elem = msg_div.find('time', class_='time')
                  if date_elem and date_elem.has_attr('datetime'):
                      date_str = date_elem['datetime']
                      try:
                          dt = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          date = dt.strftime('%Y-%m-%d %H:%M:%S')
                      except:
                          date = ' '
                  else:
                      date = ' '
                  messages.append({'text': text, 'date': date})
              return messages, soup

          def get_next_before(soup):
              prev_link = soup.find('a', class_='tgme_widget_message_bubble_previous')
              if prev_link and prev_link.has_attr('href'):
                  match = re.search(r'[?&]before=(\d+)', prev_link['href'])
                  if match:
                      return match.group(1)
              return None

          def main():
              channel = clean_channel(os.environ['CHANNEL'])
              limit = int(os.environ.get('LIMIT', 50))
              print(f"   : https://t.me/s/{channel}")
              all_messages = []
              before = None
              retries = 0
              while len(all_messages) < limit and retries < 5:
                  print(f"  (: {before})...")
                  html_content = fetch_page(channel, before)
                  messages, soup = parse_messages(html_content)
                  if not messages:
                      break
                  all_messages.extend(messages)
                  before = get_next_before(soup)
                  if not before:
                      break
                  time.sleep(1)
                  retries += 1

              all_messages = all_messages[:limit]
              print(f"{len(all_messages)}   .")

              output_path = "telegram/channel_messages.html"

              # CSS    (  )
              css = """
              <style>
                  :root {
                      --primary: #2A9D8F;
                      --primary-dark: #21867a;
                      --secondary: #E9C46A;
                      --dark: #264653;
                      --light: #F8F9FA;
                      --gray: #6c757d;
                      --border-radius: 20px;
                      --box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 5px 10px rgba(0,0,0,0.03);
                  }
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
                      direction: rtl;
                      text-align: right;
                      padding: 2rem;
                      min-height: 100vh;
                  }
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                  }
                  .header {
                      background: white;
                      border-radius: var(--border-radius);
                      padding: 1.5rem 2rem;
                      margin-bottom: 2rem;
                      box-shadow: var(--box-shadow);
                      border-right: 8px solid var(--primary);
                      transition: transform 0.2s;
                  }
                  .header:hover {
                      transform: translateY(-3px);
                  }
                  h1 {
                      color: var(--dark);
                      font-size: 1.8rem;
                      margin-bottom: 0.5rem;
                      display: flex;
                      align-items: center;
                      gap: 10px;
                  }
                  h1::before {
                      content: "";
                      font-size: 2rem;
                  }
                  .badge {
                      display: inline-block;
                      background: var(--primary);
                      color: white;
                      padding: 0.3rem 1rem;
                      border-radius: 30px;
                      font-size: 0.85rem;
                      margin-top: 0.5rem;
                  }
                  .message {
                      background: white;
                      border-radius: var(--border-radius);
                      padding: 1.2rem 1.5rem;
                      margin-bottom: 1.2rem;
                      box-shadow: var(--box-shadow);
                      transition: all 0.2s ease;
                      border-right: 5px solid var(--secondary);
                      position: relative;
                      overflow: hidden;
                  }
                  .message:hover {
                      transform: translateX(-5px);
                      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
                      border-right-color: var(--primary);
                  }
                  .message::before {
                      content: "";
                      position: absolute;
                      top: 0;
                      left: 0;
                      width: 100%;
                      height: 100%;
                      background: radial-gradient(circle at top left, rgba(42,157,143,0.03) 0%, transparent 70%);
                      pointer-events: none;
                  }
                  .date {
                      color: var(--gray);
                      font-size: 0.8rem;
                      margin-bottom: 0.8rem;
                      display: flex;
                      align-items: center;
                      gap: 8px;
                  }
                  .date::before {
                      content: "";
                      font-size: 0.9rem;
                  }
                  .text {
                      color: var(--dark);
                      line-height: 1.6;
                      font-size: 1rem;
                      white-space: pre-wrap;
                      word-break: break-word;
                  }
                  .text a {
                      color: var(--primary);
                      text-decoration: none;
                      border-bottom: 1px dashed var(--primary);
                  }
                  .text a:hover {
                      color: var(--primary-dark);
                  }
                  .footer {
                      text-align: center;
                      margin-top: 2rem;
                      padding: 1rem;
                      color: var(--gray);
                      font-size: 0.8rem;
                      border-top: 1px solid rgba(0,0,0,0.05);
                  }
                  @media (max-width: 600px) {
                      body {
                          padding: 1rem;
                      }
                      .header {
                          padding: 1rem;
                      }
                      h1 {
                          font-size: 1.4rem;
                      }
                      .message {
                          padding: 1rem;
                      }
                  }
              </style>
              """

              html_output = f"""<!DOCTYPE html>
              <html lang="fa">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
                  <title>  @{channel}</title>
                  {css}
              </head>
              <body>
              <div class="container">
                  <div class="header">
                      <h1>  @{channel}</h1>
                      <div class="badge">  : {len(all_messages)}</div>
                  </div>
                  <div class="messages">
              """
              for msg in all_messages:
                  safe_text = html.escape(msg['text']).replace('\n', '<br>')
                  #  
                  safe_text = re.sub(r'(https?://[^\s]+)', r'<a href="\1" target="_blank" rel="noopener noreferrer">\1</a>', safe_text)
                  html_output += f"""
                      <div class="message">
                          <div class="date">{msg['date']}</div>
                          <div class="text">{safe_text}</div>
                      </div>
                  """
              html_output += f"""
                  </div>
                  <div class="footer">
                         GitHub Actions � {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
                  </div>
              </div>
              </body>
              </html>
              """

              with open(output_path, "w", encoding="utf-8") as f:
                  f.write(html_output)
              print(f" {output_path}       .")

          if __name__ == "__main__":
              main()
          EOF

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update channel messages with colorful professional style"
          file_pattern: "telegram/*.html"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"