name: Fetch Multiple Telegram Channels (Web Scraping)

on:
  workflow_dispatch:
    inputs:
      channels:
        description: '  (    : channel1, @channel2, channel3)'
        required: true
        default: 'my_channel'
      limit_per_channel:
        description: '      ( )'
        required: false
        default: '30'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch messages and generate multi-channel HTML
        env:
          CHANNELS_INPUT: ${{ github.event.inputs.channels }}
          LIMIT: ${{ github.event.inputs.limit_per_channel }}
        run: |
          python - <<EOF
          import os, re, time, html, requests
          from bs4 import BeautifulSoup
          from datetime import datetime

          os.makedirs("telegram", exist_ok=True)

          def clean_channel(ch):
              ch = ch.strip()
              if ch.startswith('@'):
                  ch = ch[1:]
              return ch

          def fetch_page(channel, before=None):
              url = f"https://t.me/s/{channel}"
              if before:
                  url += f"?before={before}"
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              resp = requests.get(url, headers=headers, timeout=15)
              resp.raise_for_status()
              return resp.text

          def parse_messages(html_content):
              soup = BeautifulSoup(html_content, 'html.parser')
              messages = []
              for msg_div in soup.find_all('div', class_='tgme_widget_message'):
                  text_elem = msg_div.find('div', class_='tgme_widget_message_text')
                  if not text_elem:
                      continue
                  text = text_elem.get_text(separator='\n').strip()
                  if not text:
                      continue
                  date_elem = msg_div.find('time', class_='time')
                  if date_elem and date_elem.has_attr('datetime'):
                      date_str = date_elem['datetime']
                      try:
                          dt = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          date = dt.strftime('%Y-%m-%d %H:%M:%S')
                      except:
                          date = ' '
                  else:
                      date = ' '
                  messages.append({'text': text, 'date': date})
              return messages, soup

          def get_next_before(soup):
              prev_link = soup.find('a', class_='tgme_widget_message_bubble_previous')
              if prev_link and prev_link.has_attr('href'):
                  match = re.search(r'[?&]before=(\d+)', prev_link['href'])
                  if match:
                      return match.group(1)
              return None

          def fetch_channel_messages(channel, limit):
              print(f"  : {channel}")
              all_messages = []
              before = None
              max_pages = 8  #          
              pages_fetched = 0

              while len(all_messages) < limit and pages_fetched < max_pages:
                  try:
                      html_content = fetch_page(channel, before)
                      messages, soup = parse_messages(html_content)
                      if not messages:
                          break
                      #      (  )
                      new_messages = [m for m in messages if m not in all_messages]
                      all_messages.extend(new_messages)
                      before = get_next_before(soup)
                      if not before:
                          break
                      time.sleep(1)  #   
                      pages_fetched += 1
                  except requests.exceptions.RequestException as e:
                      print(f"   {channel}: {e}")
                      break
                  except Exception as e:
                      print(f"   {channel}: {e}")
                      break

              #     
              return all_messages[:limit]

          def main():
              raw_channels = os.environ['CHANNELS_INPUT']
              #       
              channel_list = [clean_channel(ch) for ch in raw_channels.split(',') if ch.strip()]
              limit = int(os.environ.get('LIMIT', 30))

              if not channel_list:
                  raise ValueError("    .      .")

              all_data = {}
              for ch in channel_list:
                  msgs = fetch_channel_messages(ch, limit)
                  all_data[ch] = msgs
                  print(f" {ch}: {len(msgs)}   .")

              output_path = "telegram/channel_messages.html"

              # CSS     
              css = """
              <style>
                  :root {
                      --primary: #2A9D8F;
                      --primary-dark: #21867a;
                      --secondary: #E9C46A;
                      --dark: #264653;
                      --light: #F8F9FA;
                      --gray: #6c757d;
                      --border-radius: 20px;
                      --box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 5px 10px rgba(0,0,0,0.03);
                  }
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
                      direction: rtl;
                      text-align: right;
                      padding: 2rem;
                      min-height: 100vh;
                  }
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                  }
                  .header {
                      background: white;
                      border-radius: var(--border-radius);
                      padding: 1.5rem 2rem;
                      margin-bottom: 2rem;
                      box-shadow: var(--box-shadow);
                      border-right: 8px solid var(--primary);
                      transition: transform 0.2s;
                  }
                  .header:hover {
                      transform: translateY(-3px);
                  }
                  h1 {
                      color: var(--dark);
                      font-size: 1.8rem;
                      margin-bottom: 0.5rem;
                      display: flex;
                      align-items: center;
                      gap: 10px;
                  }
                  h1::before {
                      content: "";
                      font-size: 2rem;
                  }
                  .channel-selector {
                      margin: 1rem 0;
                      display: flex;
                      align-items: center;
                      gap: 12px;
                      flex-wrap: wrap;
                  }
                  .channel-selector label {
                      font-weight: bold;
                      color: var(--dark);
                  }
                  select {
                      padding: 0.5rem 1rem;
                      border-radius: 30px;
                      border: 1px solid #ddd;
                      background: white;
                      font-size: 1rem;
                      cursor: pointer;
                      transition: all 0.2s;
                      font-family: inherit;
                  }
                  select:hover {
                      border-color: var(--primary);
                  }
                  .badge {
                      display: inline-block;
                      background: var(--primary);
                      color: white;
                      padding: 0.3rem 1rem;
                      border-radius: 30px;
                      font-size: 0.85rem;
                      margin-top: 0.5rem;
                  }
                  .message {
                      background: white;
                      border-radius: var(--border-radius);
                      padding: 1.2rem 1.5rem;
                      margin-bottom: 1.2rem;
                      box-shadow: var(--box-shadow);
                      transition: all 0.2s ease;
                      border-right: 5px solid var(--secondary);
                      position: relative;
                      overflow: hidden;
                  }
                  .message:hover {
                      transform: translateX(-5px);
                      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
                      border-right-color: var(--primary);
                  }
                  .message::before {
                      content: "";
                      position: absolute;
                      top: 0;
                      left: 0;
                      width: 100%;
                      height: 100%;
                      background: radial-gradient(circle at top left, rgba(42,157,143,0.03) 0%, transparent 70%);
                      pointer-events: none;
                  }
                  .date {
                      color: var(--gray);
                      font-size: 0.8rem;
                      margin-bottom: 0.8rem;
                      display: flex;
                      align-items: center;
                      gap: 8px;
                  }
                  .date::before {
                      content: "";
                      font-size: 0.9rem;
                  }
                  .text {
                      color: var(--dark);
                      line-height: 1.6;
                      font-size: 1rem;
                      white-space: pre-wrap;
                      word-break: break-word;
                  }
                  .text a {
                      color: var(--primary);
                      text-decoration: none;
                      border-bottom: 1px dashed var(--primary);
                  }
                  .text a:hover {
                      color: var(--primary-dark);
                  }
                  .footer {
                      text-align: center;
                      margin-top: 2rem;
                      padding: 1rem;
                      color: var(--gray);
                      font-size: 0.8rem;
                      border-top: 1px solid rgba(0,0,0,0.05);
                  }
                  .error-msg {
                      background: #ffeaea;
                      border-right: 5px solid #e74c3c;
                      padding: 1rem;
                      border-radius: var(--border-radius);
                      color: #c0392b;
                      text-align: center;
                  }
                  @media (max-width: 600px) {
                      body { padding: 1rem; }
                      .header { padding: 1rem; }
                      h1 { font-size: 1.4rem; }
                      .message { padding: 1rem; }
                  }
              </style>
              """

              #  HTML    JSON 
              select_options = ""
              channels_divs = ""

              first_channel = None
              for ch, msgs in all_data.items():
                  if first_channel is None:
                      first_channel = ch
                  display_style = "block" if ch == first_channel else "none"
                  # Escape      id
                  safe_ch_id = re.sub(r'[^a-zA-Z0-9]', '_', ch)
                  select_options += f'<option value="{safe_ch_id}"> @{html.escape(ch)}</option>\n'

                  #    
                  if not msgs:
                      messages_html = f'<div class="error-msg">        .</div>'
                  else:
                      messages_html = ""
                      for msg in msgs:
                          safe_text = html.escape(msg['text']).replace('\n', '<br>')
                          #      
                          safe_text = re.sub(r'(https?:\/\/[^\s<>]+)', r'<a href="\1" target="_blank" rel="noopener noreferrer">\1</a>', safe_text)
                          messages_html += f"""
                          <div class="message">
                              <div class="date">{msg['date']}</div>
                              <div class="text">{safe_text}</div>
                          </div>
                          """
                  channels_divs += f'<div id="channel-{safe_ch_id}" class="channel-messages" style="display: {display_style};">{messages_html}</div>\n'

              total_messages = sum(len(msgs) for msgs in all_data.values())

              html_output = f"""<!DOCTYPE html>
              <html lang="fa">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>   </title>
                  {css}
              </head>
              <body>
              <div class="container">
                  <div class="header">
                      <h1>   </h1>
                      <div class="channel-selector">
                          <label>  :</label>
                          <select id="channelSelect">
                              {select_options}
                          </select>
                      </div>
                      <div class="badge">  : {total_messages}</div>
                  </div>
                  <div id="messagesContainer">
                      {channels_divs}
                  </div>
                  <div class="footer">
                          GitHub Actions � {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
                  </div>
              </div>
              <script>
                  const selectEl = document.getElementById('channelSelect');
                  const containers = document.querySelectorAll('.channel-messages');
                  function showChannel(channelId) {{
                      containers.forEach(container => {{
                          if (container.id === 'channel-' + channelId) {{
                              container.style.display = 'block';
                          }} else {{
                              container.style.display = 'none';
                          }}
                      }});
                  }}
                  selectEl.addEventListener('change', (e) => {{
                      showChannel(e.target.value);
                  }});
                  //   
                  if (selectEl.options.length) showChannel(selectEl.value);
              </script>
              </body>
              </html>
              """

              with open(output_path, "w", encoding="utf-8") as f:
                  f.write(html_output)
              print(f" {output_path}    .")

          if __name__ == "__main__":
              main()
          EOF

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add multi-channel Telegram messages with debugged version"
          file_pattern: "telegram/*.html"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"