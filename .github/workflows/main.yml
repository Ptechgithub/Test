name: Fetch Telegram Channel Messages (Web Scraping)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کاربری کانال (مثال: example یا @example)'
        required: true
        default: 'my_channel'
      limit:
        description: 'تعداد پیام‌های مورد نظر (حداکثر ۲۰۰)'
        required: false
        default: '50'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch messages and generate HTML
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python - <<EOF
          import os, re, time, html, requests
          from bs4 import BeautifulSoup
          from datetime import datetime

          os.makedirs("telegram", exist_ok=True)

          def clean_channel(ch):
              ch = ch.strip()
              if ch.startswith('@'):
                  ch = ch[1:]
              return ch

          def fetch_page(channel, before=None):
              url = f"https://t.me/s/{channel}"
              if before:
                  url += f"?before={before}"
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              resp = requests.get(url, headers=headers, timeout=10)
              resp.raise_for_status()
              return resp.text

          def parse_messages(html_content):
              soup = BeautifulSoup(html_content, 'html.parser')
              messages = []
              for msg_div in soup.find_all('div', class_='tgme_widget_message'):
                  text_elem = msg_div.find('div', class_='tgme_widget_message_text')
                  if not text_elem:
                      continue
                  text = text_elem.get_text(separator='\n').strip()
                  if not text:
                      continue
                  date_elem = msg_div.find('time', class_='time')
                  if date_elem and date_elem.has_attr('datetime'):
                      date_str = date_elem['datetime']
                      try:
                          dt = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          date = dt.strftime('%Y-%m-%d %H:%M:%S')
                      except:
                          date = 'تاریخ نامشخص'
                  else:
                      date = 'تاریخ نامشخص'
                  messages.append({'text': text, 'date': date})
              return messages, soup

          def get_next_before(soup):
              prev_link = soup.find('a', class_='tgme_widget_message_bubble_previous')
              if prev_link and prev_link.has_attr('href'):
                  match = re.search(r'[?&]before=(\d+)', prev_link['href'])
                  if match:
                      return match.group(1)
              return None

          def main():
              channel = clean_channel(os.environ['CHANNEL'])
              limit = int(os.environ.get('LIMIT', 50))
              print(f"دریافت پیام‌های کانال عمومی: https://t.me/s/{channel}")
              all_messages = []
              before = None
              retries = 0
              while len(all_messages) < limit and retries < 5:
                  print(f"دریافت صفحه (قبل: {before})...")
                  html_content = fetch_page(channel, before)
                  messages, soup = parse_messages(html_content)
                  if not messages:
                      break
                  all_messages.extend(messages)
                  before = get_next_before(soup)
                  if not before:
                      break
                  time.sleep(1)
                  retries += 1

              all_messages = all_messages[:limit]
              print(f"{len(all_messages)} پیام دریافت شد.")

              output_path = "telegram/channel_messages.html"

              # استایل شبیه به تلگرام (Telegram Web / t.me)
              css = """
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                      background-color: #eef2f5;
                      direction: rtl;
                      text-align: right;
                      padding: 20px 16px;
                      color: #222;
                  }
                  .telegram-container {
                      max-width: 700px;
                      margin: 0 auto;
                      background: #ffffff;
                      border-radius: 16px;
                      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.08);
                      overflow: hidden;
                  }
                  .channel-header {
                      background-color: #ffffff;
                      border-bottom: 1px solid #dbdbdb;
                      padding: 18px 20px;
                      text-align: center;
                  }
                  .channel-header h1 {
                      font-size: 1.5rem;
                      font-weight: 500;
                      color: #1f2b38;
                      margin: 0 0 4px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      gap: 8px;
                  }
                  .channel-header h1::before {
                      content: "📢";
                      font-size: 1.6rem;
                  }
                  .channel-header .badge {
                      font-size: 0.8rem;
                      color: #6f7a86;
                      background: #f0f2f4;
                      display: inline-block;
                      padding: 4px 12px;
                      border-radius: 20px;
                      margin-top: 8px;
                  }
                  .message-list {
                      padding: 8px 0;
                  }
                  .message {
                      padding: 12px 20px;
                      border-bottom: 1px solid #f0f0f0;
                      transition: background 0.1s ease;
                  }
                  .message:hover {
                      background-color: #fafbfc;
                  }
                  .message-date {
                      font-size: 0.7rem;
                      color: #8d98a3;
                      margin-bottom: 6px;
                      letter-spacing: -0.2px;
                  }
                  .message-text {
                      font-size: 0.95rem;
                      line-height: 1.5;
                      color: #1c2c3c;
                      word-wrap: break-word;
                      white-space: pre-wrap;
                  }
                  .message-text a {
                      color: #2999e0;
                      text-decoration: none;
                      border-bottom: 1px solid #c9e9ff;
                  }
                  .message-text a:hover {
                      text-decoration: underline;
                  }
                  .footer {
                      background: #f9fafa;
                      padding: 14px 20px;
                      text-align: center;
                      font-size: 0.7rem;
                      color: #8e9aa7;
                      border-top: 1px solid #ecf0f3;
                  }
                  @media (max-width: 500px) {
                      body {
                          padding: 10px 8px;
                      }
                      .telegram-container {
                          border-radius: 12px;
                      }
                      .channel-header {
                          padding: 14px 16px;
                      }
                      .message {
                          padding: 10px 16px;
                      }
                  }
              </style>
              """

              html_output = f"""<!DOCTYPE html>
              <html lang="fa">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>پیام‌های کانال @{channel} · تلگرام</title>
                  {css}
              </head>
              <body>
              <div class="telegram-container">
                  <div class="channel-header">
                      <h1>کانال @{channel}</h1>
                      <div class="badge">{len(all_messages)} پیام</div>
                  </div>
                  <div class="message-list">
              """
              for msg in all_messages:
                  safe_text = html.escape(msg['text']).replace('\n', '<br>')
                  # تبدیل خودکار لینک‌ها
                  safe_text = re.sub(r'(https?://[^\s]+)', r'<a href="\1" target="_blank" rel="noopener noreferrer">\1</a>', safe_text)
                  html_output += f"""
                      <div class="message">
                          <div class="message-date">{msg['date']}</div>
                          <div class="message-text">{safe_text}</div>
                      </div>
                  """
              html_output += f"""
                  </div>
                  <div class="footer">
                      دریافت شده با GitHub Actions • {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
                  </div>
              </div>
              </body>
              </html>
              """

              with open(output_path, "w", encoding="utf-8") as f:
                  f.write(html_output)
              print(f"فایل {output_path} با استایل تلگرامی ساخته شد.")

          if __name__ == "__main__":
              main()
          EOF

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update channel messages with Telegram-like style"
          file_pattern: "telegram/*.html"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"