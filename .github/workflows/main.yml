name: Fetch Telegram Channel Messages (Web Scraping)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کاربری کانال (مثال: example یا @example)'
        required: true
        default: 'my_channel'
      limit:
        description: 'تعداد پیام‌های مورد نظر (حداکثر ۲۰۰)'
        required: false
        default: '50'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch messages and generate HTML
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python - <<EOF
          import os, re, time, html, requests
          from bs4 import BeautifulSoup
          from datetime import datetime

          def clean_channel(ch):
              ch = ch.strip()
              if ch.startswith('@'):
                  ch = ch[1:]
              return ch

          def fetch_page(channel, before=None):
              url = f"https://t.me/s/{channel}"
              if before:
                  url += f"?before={before}"
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              resp = requests.get(url, headers=headers, timeout=10)
              resp.raise_for_status()
              return resp.text

          def parse_messages(html_content):
              soup = BeautifulSoup(html_content, 'html.parser')
              messages = []
              for msg_div in soup.find_all('div', class_='tgme_widget_message'):
                  # استخراج متن
                  text_elem = msg_div.find('div', class_='tgme_widget_message_text')
                  if not text_elem:
                      continue
                  text = text_elem.get_text(separator='\n').strip()
                  if not text:
                      continue
                  # تاریخ
                  date_elem = msg_div.find('time', class_='time')
                  if date_elem and date_elem.has_attr('datetime'):
                      date_str = date_elem['datetime']  # ISO format
                      try:
                          dt = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          date = dt.strftime('%Y-%m-%d %H:%M:%S')
                      except:
                          date = 'تاریخ نامشخص'
                  else:
                      date = 'تاریخ نامشخص'
                  messages.append({'text': text, 'date': date})
              return messages, soup

          def get_next_before(soup):
              prev_link = soup.find('a', class_='tgme_widget_message_bubble_previous')
              if prev_link and prev_link.has_attr('href'):
                  # href like "?before=12345"
                  match = re.search(r'[?&]before=(\d+)', prev_link['href'])
                  if match:
                      return match.group(1)
              return None

          def main():
              channel = clean_channel(os.environ['CHANNEL'])
              limit = int(os.environ.get('LIMIT', 50))
              print(f"دریافت پیام‌های کانال عمومی: https://t.me/s/{channel}")
              all_messages = []
              before = None
              retries = 0
              while len(all_messages) < limit and retries < 5:
                  print(f"دریافت صفحه (قبل: {before})...")
                  html_content = fetch_page(channel, before)
                  messages, soup = parse_messages(html_content)
                  if not messages:
                      break
                  all_messages.extend(messages)
                  before = get_next_before(soup)
                  if not before:
                      break
                  time.sleep(1)  # احترام به سرور
                  retries += 1

              # محدود کردن به تعداد درخواستی
              all_messages = all_messages[:limit]
              print(f"{len(all_messages)} پیام دریافت شد.")

              # ساخت HTML
              html_output = f"""<!DOCTYPE html>
              <html>
              <head>
                  <meta charset="UTF-8">
                  <title>پیام‌های کانال {channel}</title>
                  <style>
                      body {{ font-family: Tahoma, sans-serif; direction: rtl; text-align: right; margin: 20px; }}
                      .message {{ border: 1px solid #ccc; margin: 10px 0; padding: 10px; border-radius: 8px; }}
                      .date {{ color: #666; font-size: 0.8em; }}
                      .text {{ margin-top: 5px; white-space: pre-wrap; }}
                  </style>
              </head>
              <body>
                  <h1>پیام‌های کانال @{channel}</h1>
                  <p>تعداد پیام‌ها: {len(all_messages)}</p>
              """
              for msg in all_messages:
                  safe_text = html.escape(msg['text']).replace('\n', '<br>')
                  html_output += f"""
                  <div class="message">
                      <div class="date">{msg['date']}</div>
                      <div class="text">{safe_text}</div>
                  </div>
                  """
              html_output += "</body></html>"

              with open("channel_messages.html", "w", encoding="utf-8") as f:
                  f.write(html_output)
              print("فایل channel_messages.html ساخته شد.")

          if __name__ == "__main__":
              main()
          EOF

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram_messages
          path: channel_messages.html