                countBadge.textContent = 'خطا در دریافت';
                return;
            }
            const messages = data.messages;
            if (!messages.length) {
                container.innerHTML = '<div class="error-message">⚠️ هیچ پیامی برای این کانال یافت نشد.</div>';
                countBadge.textContent = '۰ پیام';
                return;
            }
            countBadge.textContent = '📨 ' + messages.length + ' پیام';
            let html = '';
            for (let i = 0; i < messages.length; i++) {
                let msg = messages[i];
                let text = escapeHtml(msg.text).replace(/\n/g, '<br>');
                text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
                html += '<div class="message">' +
                        '<div class="date">🕒 ' + escapeHtml(msg.date) + '</div>' +
                        '<div class="text">' + text + '</div>' +
                        '</div>';
            }
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const selectEl = document.getElementById('channelSelect');
        selectEl.addEventListener('change', (e) => renderMessages(e.target.value));
        if (selectEl.options.length > 1) {
            selectEl.selectedIndex = 1;
            renderMessages(selectEl.value);
        }
    
    </script>
    </body>
    </html>
