name: Fetch Telegram Channel Messages (Multi‑Channel)

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'نام کانال(ها) (با کاما جدا کنید، با یا بدون @) مثل: my_channel,news,@channel3'
        required: true
        default: 'my_channel'
      limit:
        description: 'حداکثر تعداد پیام برای هر کانال (پیش‌فرض ۵۰)'
        required: false
        default: '50'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch messages and generate HTML
        env:
          CHANNELS: ${{ github.event.inputs.channels }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python - <<'EOL'
          import os, re, time, html, requests, json
          from bs4 import BeautifulSoup
          from datetime import datetime

          os.makedirs("telegram", exist_ok=True)

          def clean_channel(ch):
              ch = ch.strip()
              if ch.startswith('@'):
                  ch = ch[1:]
              return ch

          def fetch_page(channel, before=None):
              url = f"https://t.me/s/{channel}"
              if before:
                  url += f"?before={before}"
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              resp = requests.get(url, headers=headers, timeout=10)
              resp.raise_for_status()
              return resp.text

          def parse_messages(html_content):
              soup = BeautifulSoup(html_content, 'html.parser')
              messages = []
              for msg_div in soup.find_all('div', class_='tgme_widget_message'):
                  text_elem = msg_div.find('div', class_='tgme_widget_message_text')
                  if not text_elem:
                      continue
                  text = text_elem.get_text(separator='\n').strip()
                  if not text:
                      continue
                  date_elem = msg_div.find('time', class_='time')
                  if date_elem and date_elem.has_attr('datetime'):
                      date_str = date_elem['datetime']
                      try:
                          dt = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          date = dt.strftime('%Y-%m-%d %H:%M:%S')
                      except:
                          date = 'نامشخص'
                  else:
                      date = 'نامشخص'
                  messages.append({'text': text, 'date': date})
              return messages, soup

          def get_next_before(soup):
              prev_link = soup.find('a', class_='tgme_widget_message_bubble_previous')
              if prev_link and prev_link.has_attr('href'):
                  match = re.search(r'[?&]before=(\d+)', prev_link['href'])
                  if match:
                      return match.group(1)
              return None

          def fetch_channel_messages(channel, limit):
              try:
                  channel_clean = clean_channel(channel)
                  print(f"🔄 در حال دریافت پیام‌های @{channel_clean} ...")
                  all_messages = []
                  before = None
                  retries = 0
                  while len(all_messages) < limit and retries < 5:
                      html_content = fetch_page(channel_clean, before)
                      messages, soup = parse_messages(html_content)
                      if not messages:
                          break
                      all_messages.extend(messages)
                      before = get_next_before(soup)
                      if not before:
                          break
                      time.sleep(1)
                      retries += 1
                  all_messages = all_messages[:limit]
                  print(f"✅ {len(all_messages)} پیام از @{channel_clean} دریافت شد.")
                  return True, all_messages
              except Exception as e:
                  error_msg = f"خطا در دریافت کانال {channel}: {str(e)}"
                  print(f"❌ {error_msg}")
                  return False, error_msg

          def main():
              channels_input = os.environ.get('CHANNELS', '')
              if not channels_input:
                  print("⚠️ هیچ کانالی وارد نشده است.")
                  return
              limit = int(os.environ.get('LIMIT', 50))

              channel_list = [ch.strip() for ch in channels_input.split(',') if ch.strip()]
              if not channel_list:
                  print("⚠️ لیست کانال‌ها خالی است.")
                  return

              results = {}
              for ch in channel_list:
                  success, data = fetch_channel_messages(ch, limit)
                  results[ch] = {'status': 'success' if success else 'error', 'data': data}

              # CSS (بدون تغییر)
              css = """
              <style>
                  :root {
                      --primary: #2A9D8F;
                      --primary-dark: #21867a;
                      --secondary: #E9C46A;
                      --dark: #264653;
                      --light: #F8F9FA;
                      --gray: #6c757d;
                      --border-radius: 20px;
                      --box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 5px 10px rgba(0,0,0,0.03);
                  }
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
                      direction: rtl;
                      text-align: right;
                      padding: 2rem;
                      min-height: 100vh;
                  }
                  .container { max-width: 900px; margin: 0 auto; }
                  .header {
                      background: white;
                      border-radius: var(--border-radius);
                      padding: 1.5rem 2rem;
                      margin-bottom: 2rem;
                      box-shadow: var(--box-shadow);
                      border-right: 8px solid var(--primary);
                      transition: transform 0.2s;
                  }
                  .header:hover { transform: translateY(-3px); }
                  h1 {
                      color: var(--dark);
                      font-size: 1.8rem;
                      margin-bottom: 0.5rem;
                      display: flex;
                      align-items: center;
                      gap: 10px;
                  }
                  h1::before { content: "📡"; font-size: 2rem; }
                  .channel-selector {
                      margin-top: 1rem;
                      display: flex;
                      align-items: center;
                      gap: 1rem;
                      flex-wrap: wrap;
                  }
                  .channel-selector label { font-weight: bold; color: var(--dark); }
                  select {
                      padding: 0.6rem 1rem;
                      border-radius: 30px;
                      border: 1px solid #ddd;
                      background: white;
                      font-size: 1rem;
                      cursor: pointer;
                      outline: none;
                      transition: 0.2s;
                      font-family: inherit;
                  }
                  select:hover { border-color: var(--primary); }
                  .badge {
                      display: inline-block;
                      background: var(--primary);
                      color: white;
                      padding: 0.3rem 1rem;
                      border-radius: 30px;
                      font-size: 0.85rem;
                      margin-top: 0.5rem;
                  }
                  .message {
                      background: white;
                      border-radius: var(--border-radius);
                      padding: 1.2rem 1.5rem;
                      margin-bottom: 1.2rem;
                      box-shadow: var(--box-shadow);
                      transition: all 0.2s ease;
                      border-right: 5px solid var(--secondary);
                      position: relative;
                      overflow: hidden;
                  }
                  .message:hover {
                      transform: translateX(-5px);
                      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
                      border-right-color: var(--primary);
                  }
                  .date {
                      color: var(--gray);
                      font-size: 0.8rem;
                      margin-bottom: 0.8rem;
                      display: flex;
                      align-items: center;
                      gap: 8px;
                  }
                  .date::before { content: "🕒"; font-size: 0.9rem; }
                  .text {
                      color: var(--dark);
                      line-height: 1.6;
                      font-size: 1rem;
                      white-space: pre-wrap;
                      word-break: break-word;
                  }
                  .text a {
                      color: var(--primary);
                      text-decoration: none;
                      border-bottom: 1px dashed var(--primary);
                  }
                  .text a:hover { color: var(--primary-dark); }
                  .error-message {
                      background: #ffe0e0;
                      border-right: 5px solid #e74c3c;
                      padding: 1.2rem;
                      border-radius: var(--border-radius);
                      color: #c0392b;
                  }
                  .footer {
                      text-align: center;
                      margin-top: 2rem;
                      padding: 1rem;
                      color: var(--gray);
                      font-size: 0.8rem;
                      border-top: 1px solid rgba(0,0,0,0.05);
                  }
                  @media (max-width: 600px) {
                      body { padding: 1rem; }
                      .header { padding: 1rem; }
                      h1 { font-size: 1.4rem; }
                      .message { padding: 1rem; }
                  }
              </style>
              """

              channels_data = {}
              for ch, info in results.items():
                  if info['status'] == 'success':
                      channels_data[ch] = {'status': 'success', 'messages': info['data']}
                  else:
                      channels_data[ch] = {'status': 'error', 'error': info['data']}

              json_data = json.dumps(channels_data, ensure_ascii=False)

              # جاوااسکریپت بدون هیچ ${{...}} یا backtick با متغیر
              js_code = f"""
                  const channelData = {json_data};

                  function renderMessages(channelName) {{
                      const container = document.getElementById('messagesContainer');
                      const countBadge = document.getElementById('messageCount');
                      if (!channelName || !channelData[channelName]) {{
                          container.innerHTML = '<div class=\"error-message\">⚠️ لطفاً یک کانال معتبر انتخاب کنید.</div>';
                          countBadge.textContent = '';
                          return;
                      }}
                      const data = channelData[channelName];
                      if (data.status === 'error') {{
                          container.innerHTML = '<div class=\"error-message\">❌ ' + escapeHtml(data.error) + '</div>';
                          countBadge.textContent = 'خطا در دریافت';
                          return;
                      }}
                      const messages = data.messages;
                      if (!messages.length) {{
                          container.innerHTML = '<div class=\"error-message\">⚠️ هیچ پیامی برای این کانال یافت نشد.</div>';
                          countBadge.textContent = '۰ پیام';
                          return;
                      }}
                      countBadge.textContent = '📨 ' + messages.length + ' پیام';
                      let html = '';
                      for (let i = 0; i < messages.length; i++) {{
                          let msg = messages[i];
                          let text = escapeHtml(msg.text).replace(/\\n/g, '<br>');
                          text = text.replace(/(https?:\\/\\/[^\\s]+)/g, '<a href=\"$1\" target=\"_blank\" rel=\"noopener noreferrer\">$1</a>');
                          html += '<div class=\"message\">' +
                                  '<div class=\"date\">🕒 ' + escapeHtml(msg.date) + '</div>' +
                                  '<div class=\"text\">' + text + '</div>' +
                                  '</div>';
                      }}
                      container.innerHTML = html;
                  }}

                  function escapeHtml(str) {{
                      return str.replace(/[&<>]/g, function(m) {{
                          if (m === '&') return '&amp;';
                          if (m === '<') return '&lt;';
                          if (m === '>') return '&gt;';
                          return m;
                      }});
                  }}

                  const selectEl = document.getElementById('channelSelect');
                  selectEl.addEventListener('change', (e) => renderMessages(e.target.value));
                  if (selectEl.options.length > 1) {{
                      selectEl.selectedIndex = 1;
                      renderMessages(selectEl.value);
                  }}
              """

              options_html = ''.join(f'<option value="{html.escape(ch)}">{html.escape(ch)}</option>' for ch in channels_data.keys())
              final_html = f"""<!DOCTYPE html>
              <html lang="fa">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
                  <title>نمایشگر پیام‌های تلگرام</title>
                  {css}
              </head>
              <body>
              <div class="container">
                  <div class="header">
                      <h1>📢 پیام‌های کانال‌های تلگرام</h1>
                      <div class="channel-selector">
                          <label for="channelSelect">انتخاب کانال:</label>
                          <select id="channelSelect">
                              <option value="">-- لطفاً یک کانال را انتخاب کنید --</option>
                              {options_html}
                          </select>
                      </div>
                      <div class="badge" id="messageCount"></div>
                  </div>
                  <div id="messagesContainer" class="messages"></div>
                  <div class="footer">
                      تولید شده توسط GitHub Actions • {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
                  </div>
              </div>
              <script>
              {js_code}
              </script>
              </body>
              </html>
              """

              output_path = "telegram/channels_messages.html"
              with open(output_path, "w", encoding="utf-8") as f:
                  f.write(final_html)
              print(f"✅ فایل HTML در {output_path} ذخیره شد.")

          if __name__ == "__main__":
              main()
          EOL

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update multi-channel messages with interactive HTML selector"
          file_pattern: "telegram/*.html"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"