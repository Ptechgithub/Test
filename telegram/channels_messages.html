ش مرضیه حسینی، خبرنگار ایران‌اینترنشنال\n@iranintltv", "date": "2026-05-03 19:38:03"}, {"text": "خبرگزاری فارس، وابسته به سپاه، گزارش داد که پیشنهاد ۱۴ ماده‌ای جمهوری اسلامی در پاسخ به طرح ۹ ماده‌ای آمریکا ارائه شده و برخلاف گزارش الجزیره، شامل پذیرش توقف ۱۵ ساله غنی‌سازی یا آزادسازی تنگه هرمز نمی‌شود.\nفارس افزود در پیشنهاد جدید تهران «خطوط قرمز» به وضوح اعلام شده است.\nhttps://iranintl.com/202605037218", "date": "2026-05-03 19:43:42"}, {"text": "🗣\nروایت شما از زندگی در آتش‌بس- یکشنبه ۱۳ اردیبهشت\n🔹\nاز تهران پیام می‌دم. شرایط اقتصادی سخته، تورم بی‌سابقه‌ست و قطعی بیش از دو ماه اینترنت، زندگی و کسب‌وکار مردم رو تبدیل به یه نبرد روزمره کرده. با اینکه اینترنت قطع شده و ده‌ها هزار کسب‌وکار آنلاین نابود شده، اما امید به آینده رو هیچ‌وقت از دست نمی‌دیم.\n🔹\n۳۰ سال سن دارم، بیکار شدم. پدرم داره دو جا کار می‌کنه، ولی تنها فکر و دغدغه ما زندانی‌ها هستن. الان نه درس، نه کار، نه بی‌پولی، هیچی واسم مهم نیست. دارم دیوونه می‌شم.\n🔹\nاز گرگان پیام می‌دم. خسته شدیم از این وضعیت و تو این همه بدبختی، هر روز هم خبر یه اعدام جوون ایرانی رو باید بشنویم. خدایا خودت کمک کن.\n🔹\nگوشت تو سطح شهر کیلویی ۲ میلیون تومنه! یه دونه مرغ میشه ۸۰۰ هزار تومن. بخوای هم مهاجرت کنی، پوند ۲۵۰ هزار تومنه. نه میشه رفت، نه میشه موند.\n🔹\nتو این وضعیت، یه اینترنت ملی ضعیف و یه اپلیکیشن ضعیف‌تر ساختن برای تشکیل کلاس مجازی برای ما دانش‌آموزا که برای ورود به هر کلاس تأخیر می‌خوریم، تازه اگه وسط کلاس خودکار نیفتیم بیرون.\n🔹\nگرونی حتی روی هزینه پست هم تاثیر گذاشته. هزینه پست که قبلا ۷۰ هزار تومن برای پیشتاز می‌دادیم، الان شده ۲۵۰ هزار تومان.\n🔹\nاین حکومتی‌ها هر شب از ساعت ۸ تا ۱ نیمه‌شب، با بلندگوها و تجمعات مسخره‌شون، با ترافیکی که تو خیابون‌ها درست می‌کنن، آسایش رو ازمون گرفتن.\n🔹\nاز تهران پیام می‌دم. گرافیستم و از اوایل بهمن‌ماه تعدیل شدم. اوایل اسفند درخواست بیمه بیکاری دادم، تا امروز در دست بررسیه. حتی دنبال کار هم گشتم، هیچ شغلی وجود نداره!\n🔹\nمن کارمند یه شرکت استارتاپی هستم که همه کارهامون با اینترنته. با قطعی اینترنت همین‌طوری دارن نیروها رو تعدیل می‌کنن و حقوق‌ها رو حتی نسبت به سال قبل هم کاهش دادن.\n🔹\nوضعیت از قیمت خودروها و دلار بگیر تا مواد اولیه برای خورد و خوراک، سرسام‌آوره. اینترنت هم که تکلیفش معلومه!\n🔹\nما کاسب‌های یه پاساژ در فولادشهر اصفهان هستیم که با این وضعیت بازار و نبود مشتری، از پس چند برابر شدن اجاره مغازه‌ها برنمیایم.", "date": "2026-05-03 19:44:54"}, {"text": "روزنامه شرق در گزارشی زنان را بازنده اصلی تورم دانست و نوشت افزایش قیمت‌ها و جنگ، بازار کار زنان را کوچک‌تر کرده است.\nهمزمان مخاطبان ایران‌اینترنشنال از موج بیکاری گسترده در سایه رکود تورمی سنگین خبر می‌دهند.\nگفت‌وگو با معصومه طاهرخانی، تحلیل‌گر اقتصادی\n@iranintltv", "date": "2026-05-03 19:49:18"}, {"text": "ترامپ پیشنهاد ۱۴ ماده‌ای را رد کرد؛ تهران: پاسخ آمریکا در دست بررسی است\nرسانه عمومی اسرائیل و شبکه الجزیره گزارش دادند که رییس‌جمهوری ایالات متحده، پیشنهاد ۱۴ ماده‌ای جمهوری اسلامی برای پایان دادن به درگیری‌ها را رد کرده است. تهران نیز اعلام کرد که در حال بررسی پاسخ آمریکاست، اما مقام‌های رسمی آمریکا و پاکستان هنوز در این‌باره اظهارنظر نکرده‌اند.\nشبکه کان، رسانه عمومی اسرائیل، شامگاه یکشنبه ۱۳ اردیبهشت، در گزارشی اعلام کرد که ترامپ در گفت‌وگوی تلفنی با این رسانه گفت پیشنهاد جدید حکومت ایران برای او «قابل قبول نیست».\nکان به نقل از ترامپ گفت: «من این پیشنهاد را مطالعه و بررسی کردم. برای ما قابل قبول نیست.»\nاز سوی دیگر، الجزیره، در خبری فوری، اعلام کرد که رییس‌جمهوری آمریکا طرح پیشنهادی ۱۴ ماده‌ای را بررسی کرده و آن را «غیرقابل‌قبول» خوانده است. این رسانه به نقل از ترامپ گفت که روند نبرد «به‌خوبی پیش می‌رود».\nاین رسانه همچنین اعلام کرد که مشاور سخنگوی وزارت امور خارجه جمهوری اسلامی به این رسانه گفته است که آمریکا اصلاحاتی بر این پیشنهاد اعمال کرده و تهران اکنون در حال بررسی این پیشنهادهاست.\nالجزیره، بدون اشاره به نام این مشاور، به نقل از او نوشت که پاسخ تهران از طریق پاکستان به دست آمریکا خواهد رسید. به گفته او توقف جنگ در همه جبهه‌ها از جمله لبنان و بررسی وضعیت تنگه هرمز بخش‌هایی از تازه‌ترین طرح پیشنهادی حکومت ایران است.\nافزون بر اینها، رسانه‌های دولتی ایران به نقل از سخنگوی وزارت خارجه جمهوری اسلامی گزارش دادند که مقام‌های آمریکا «پاسخ طرح ۱۴ بندی ایران را به طرف پاکستانی داده‌اند و ما در حال بررسی آن هستیم.»\nاو افزود: «در این مرحله ما مذاکره هسته‌ای نداریم.»\nترامپ شنبه اعلام کرد که بعید می‌داند با پیشنهاد ۱۴ ماده‌ای جمهوری اسلامی برای پایان دادن به درگیر‌ی‌ها موافق باشد.\nاو در شبکه تروث سوشال ضمن اشاره به اینکه «به‌زودی طرحی را که ایران همین حالا برای ما فرستاده بررسی خواهم کرد، اما تصور نمی‌کنم قابل قبول باشد» تاکید کرد [حکومت] ایران «هنوز بهای کافی برای آنچه طی ۴۷ سال گذشته بر سر بشریت و جهان آورده، نپرداخته است.»\nخبرگزاری فارس، نزدیک به سپاه پاسداران، شنبه ۱۲ اردیبهشت در گزارشی نوشت که این پیشنهاد ۱۴ بندی، پاسخی به پیشنهاد ۹ ماده‌ای ایالات متحده برای مذاکرات است که بر «خطوط قرمز» مد نظر حکومت تاکید می‌کند و «نقشه راهی روشن» برای پایان جنگ نیز ارائه می‌دهد.\nهمچنین خبرگزاری تسنیم، وابسته به سپاه پاسداران، در گزارشی از جزییات پیشنهاد ۱۴ بندی نوشت: «واشینگتن خواستار آتش‌بس دو ماهه شده اما تهران تاکید کرده است که موضوع باید ظرف ۳۰ روز تعیین تکلیف شود.»\nبه نوشته این خبرگزاری، «تضمین عدم تجاوز نظامی، خروج نیروهای آمریکا از منطقه، رفع محاصره دریایی، آزادسازی دارایی‌های بلوکه‌شده، پرداخت غرامت، لغو تحریم‌ها و سازوکار جدید برای تنگه هرمز» از محورهای این پیشنهاد است.\nایرنا گزارش داده بود مقام‌های حکومت ایران متن «تازه‌ترین طرح مذاکرات» با آمریکا را به پاکستان به عنوان میانجی ارائه کرده‌اند.\nدر این ارتباط، دونالد ترامپ، رییس‌جمهوری آمریکا، جمعه اعلام کرده بود که از آخرین پیشنهاد ایران ناراضی است و تاکید کرد: «مطمئن نیستم به توافق برسیم.»\nروزنامه وال‌استریت ژورنال نیز جمعه از «پیشنهاد جدید جمهوری اسلامی شامل ۱۴ بند برای شکستن بن‌بست دیپلماتیک با واشینگتن» خبر داده و نوشته بود: «نشانه‌هایی از نوعی مصالحه در آن دیده می‌شود.»\nاین روزنامه افزوده بود که تهران در حال «بررسی احتمال آغاز مذاکرات جدید در اوایل هفته آینده» است.\nبر اساس این گزارش، تهران یک طرح دو مرحله‌ای پیشنهاد داده است؛ در مرحله نخست، موضوع تنگه هرمز و آینده آن در کنار شرایط پایان جنگ و دریافت تضمین از آمریکا برای توقف حملات بررسی می‌شود. در مرحله دوم، برنامه هسته‌ای و تحریم‌ها در دستور کار قرار خواهد گرفت.\nرسانه‌های اسرائیل شامگاه یکشنبه ۱۳ اردیبهشت از دیدار بنیامین نتانیاهو با دستیاران ارشد و تعدادی از اعضای کابینه امنیتی خود خبر داد.\nمرکز عملیات تجارت دریایی بریتانیا وابسته به نیروی دریایی این کشور نیز اعلام کرد یک کشتی باری یکشنبه ۱۳ اردیبهشت، در حدود ۲۰ کیلومتری غرب سیریک در تنگه هرمز، هدف حمله چند قایق کوچک قرار گرفت که به نیروهای نظامی جمهوری اسلامی تعلق داشت.\nنتانیاهو ساعاتی پیش از برگزاری این نشست، بار دیگر روی برتری هوایی ارتش اسرائیل در قبال جمهوری اسلامی تاکید کرد و گفت: «خلبانان ما می‌توانند به هر نقطه‌ای در آسمان ایران برسند و آماده هستند تا در صورت نیاز، این کار را انجام دهند.»\n🔗\nمتن کامل گزارش را اینجا بخوانید\n \n@iranintltv", "date": "2026-05-03 19:51:14"}, {"text": "🎧\nنسخه صوتی چشم‌انداز: چرا مجتبی خامنه‌ای به خدای دهه ۶۰ پناه برده است؟!\n@iranintlTV", "date": "2026-05-03 19:53:29"}, {"text": "به گزارش تانکر ترکرز، ۲۵ نفتکش حامل نفت خام در ماه آوریل از ایران خارج شدند. از این تعداد، آمریکا هفت نفتکش را در دریای عرب و اقیانوس هند تغییر مسیر داد و به ایران بازگرداند و دو نفتکش را نیز در اقیانوس هند توقیف کرد.\nبر اساس این گزارش، یک نفتکش به شرق دور رسید و بیشتر ۱۵ نفتکش دیگر نیز پس از خروج در نیمه نخست آوریل به مقصد یا نقاط تعیین‌شده خود رسیده‌اند.\nhttps://iranintl.com/202605039953", "date": "2026-05-03 15:17:46"}, {"text": "مرکز عملیات تجارت دریایی بریتانیا اعلام کرد یک کشتی فله‌بر در ۱۳ اردیبهشت، در حدود ۲۰ کیلومتری سیریک در جنوب ایران هدف حمله قرار گرفته است. کاپیتان این کشتی گفته است که چند قایق کوچک به آن حمله کرده‌اند. بر اساس این گزارش، تمامی خدمه کشتی در سلامت هستند.\nمرکز عملیات تجارت دریایی بریتانیا افزود: به کشتی‌ها توصیه شده با احتیاط تردد کنند و هرگونه فعالیت مشکوک را به این مرکز گزارش دهند.\nهمزمان رسانه‌های ایران گزارش دادند «یک کشتی که قصد ورود به تنگه هرمز را داشت از سوی قایق‌های تندرو سپاه پاسداران توقیف شده است.»\nhttps://iranintl.com/202605038950", "date": "2026-05-03 15:58:27"}, {"text": "مشاور ارشد اقتصادی کاخ سفید اعلام کرد که واقعیت این است که آنچه رییس‌جمهور مشاهده می‌کند این است که محاصره در حال اثرگذاری است و فشار بسیار زیادی بر جمهوری اسلامی وارد می‌کند. نمی‌دانم تعریف جنگ چیست، وقتی شلیک نمی‌کنیم، در حال مذاکره هستیم و آن‌ها تحت فشار زیادی هستند.\nhttps://iranintl.com/202605030371", "date": "2026-05-03 16:04:24"}, {"text": "ویدیوی رسیده به ایران‌اینترنشنال نشان می‌دهد گروهی از ایرانیان در برن سوئیس، روز یکشنبه مقابل سفارت جمهوری اسلامی تجمع کرده‌اند. شرکت‌کنندگان در این تجمع با سر دادن شعارهایی، اعدام‌ها در ایران را محکوم کرده و حمایت خود را از مطالبات آزادی‌خواهانه مردم داخل کشور اعلام کردند.\n@iranintltv", "date": "2026-05-03 16:04:42"}, {"text": "🎧\nنسخه صوتی اخبار شبانگاهی | یکشنبه ۱۳ اردیبهشت\n@iranintlTV", "date": "2026-05-03 16:06:10"}, {"text": "یک نماینده مجلس از قول قالیباف فاش کرد که هیات ایرانی از طرف مجتبی خامنه‌ای از مذاکره بر سر مسائل هسته‌ای منع شده‌اند. دیدار با قالیباف و نقل قول از او درباره جزئیات مذاکرات با دخالت سپاه، پرده تازه‌ای از جنگ قدرت در نظام است.\nگزارشی از مجتبا پورمحسن\n@iranintltv", "date": "2026-05-03 16:12:23"}, {"text": "روزنامه دنیای اقتصاد نوشت جوانان و زنان بیشترین آسیب را از قطعی اینترنت و شرایط ناشی از جنگ دیده‌اند و نرخ بیکاری زنان جوان حدود ۵ برابر میانگین بیکاری در کشور است.\nارزیابی صبا آلاله، روان‌تحلیل‌گر\n@iranintltv", "date": "2026-05-03 16:19:51"}, {"text": "دونالد ترامپ سه گزارش از وب‌سایت بریت‌بارت را در تروث‌سوشال بازنشر کرد که به روابط دولت او با اروپا در قبال ایران و ناتو می‌پردازد. در یکی از این مطالب، به نقل از ماتئو سالوینی، معاون نخست‌وزیر ایتالیا، آمده است با وجود برخی اختلاف‌ها میان ترامپ و جورجیا ملونی درباره پاپ و ناتو، پیوندهای عمیقی میان جریان‌های سیاسی حامی آنها وجود دارد. دو گزارش دیگر بر آلمان متمرکز است؛ از جمله احتمال خروج هزاران نیروی آمریکایی از پایگاه‌های این کشور طی یک سال آینده و بازنگری در آرایش استقرار نیروهای آمریکا پس از درگیری با ایران.\nهمچنین به اظهارات ترامپ خطاب به فریدریش مرتس اشاره شده که از او خواسته به جای دخالت در سیاست واشینگتن علیه تهران، بر ترمیم مشکلات داخلی آلمان تمرکز کند. در این مطالب همچنین بررسی خروج نیروهای آمریکا از اسپانیا و ایتالیا مطرح شده است.\nhttps://iranintl.com/202605030738", "date": "2026-05-03 16:23:10"}, {"text": "تیتر اول با نیوشا صارمی، یکشنبه ۱۳ اردیبهشت\n@iranintltv", "date": "2026-05-03 16:34:50"}, {"text": "به گزارش رسانه‌های اسرائیل، همزمان با سفر فرمانده سنتکام به منطقه، ارتش اسرائیل در حال آماده‌سازی برای سناریوی حمله احتمالی آمریکا به ایران است. بنیامین نتانیاهو گفت هر نقطه از حریم هوایی ایران در دسترس اسرائیل است.\nهمزمان سازمان اطلاعات سپاه اعلام کرد آمریکا ناچار است بین «عملیات غیرممکن» یا «توافق بد» یکی را انتخاب کند. در همین حال گزارش‌ها از تشدید فضای امنیتی در تهران حکایت دارد.\nگفت‌وگو با مسعود کاظمی، روزنامه‌نگار و اشکان صفایی، خبرنگار ایران‌اینترنشنال\n@iranintltv", "date": "2026-05-03 16:57:16"}, {"text": "بانک مرکزی در واکنش به رکوردشکنی تاریخی نرخ ارز با عبور قیمت دلار از ۱۸۷ هزار تومان، اعلام کرد: «در صورت تعدیل انتظارات، افزایش عرضه یا مداخله هدفمند بانک مرکزی، احتمال بازگشت قیمت‌ها و زیان خریداران در نرخ‌های بالا وجود دارد.»\n \nبانک مرکزی هشدار داد: «با توجه به ابزارهای در اختیار سیاست‌گذار ارزی و امکان مداخله موثر بازارساز در زمان مقتضی، هرگونه رفتار سفته‌بازانه و خریدهای هیجانی می‌تواند پرریسک باشد.»\n \nدر ادامه روند افزایش قیمت ارزهای خارجی در بازار آزاد ایران، یکشنبه، ۱۳ اردیبهشت، قیمت دلار از ۱۸۷ هزار تومان عبور کرد. همچنین هر یورو به ۲۲۳ هزار تومان و هر پوند بریتانیا به ۲۵۸ هزار تومان رسید.\nhttps://iranintl.com/202605031648", "date": "2026-05-03 17:00:15"}, {"text": "روز یکشنبه ۱۳ اردیبهشت، ایرانیان ساکن استراسبورگ فرانسه با برگزاری تجمعی، حمایت خود را از انقلاب ملی نشان دادند. آن‌ها همچنین در این تجمع در حمایت از شاهزاده رضا پهلوی، شعار «جاوید شاه» سر دادند.\n@iranintltv", "date": "2026-05-03 17:02:02"}, {"text": "پس از هشدار دونالد ترامپ درباره احتمال از سرگیری حملات علیه جمهوری اسلامی، رفت‌وآمد هوایی نظامی ایالات متحده در خاورمیانه به‌طور چشمگیری افزایش یافته است.\nگفت‌وگو با فرزین ندیمی، پژوهش‌گر ارشد امور دفاعی و امنیتی\n@iranintltv", "date": "2026-05-03 17:03:43"}, {"text": "🔻\nیانیک سینر، مرد شماره یک تنیس جهان، الکساندر زورف را در فینال مسترز مادرید شکست داد و قهرمان شد. این ستاره ایتالیایی به اولین تنیسور تاریخ بدل شد که هر چهار مسترز ابتدایی سال را با قهرمانی به پایان می‌رساند. \n🔹\nاو پیش‌تر در مسترز ایندین ولز، میامی و مونته کارلو هم قهرمان شده بود. علاوه بر این، سینر اولین بازیکن تاریخ شد که پنج مسترز هزار امتیازی را بدست آورد.\n🔹\nسینر تنها با پیروزی در دو ست و با نتایج ۶-۱ و ۶-۲، در مادرید قهرمان شد. \n🔹\nسینر ۲۴ ساله با ۱۴۳۵۰ امتیاز، اکنون مرد شماره یک تنیس دنیاست. کارلوس آلکاراس اسپانیایی با ۱۲۹۶۰ امتیاز در رده دوم قرار دارد.\n@iranintltvsport", "date": "2026-05-03 17:05:38"}, {"text": "اسماعیل بقائی، سخنگوی وزارت خارجه جمهوری اسلامی، گفت طرح پیشنهادی ۱۴ بندی تهران منحصرا بر پایان جنگ متمرکز است و موضوع هسته‌ای مطلقا در آن جایی ندارد.\nاو افزود آمریکایی‌ها پاسخ این طرح را به طرف پاکستانی داده‌اند و جمهوری اسلامی در حال بررسی آن است.\nبقائی همچنین گفت ادعای تعهد جمهوری اسلامی به مین‌روبی تنگه هرمز «تخیلات رسانه‌ها» است.\nhttps://iranintl.com/202605033627", "date": "2026-05-03 17:08:16"}, {"text": "🔻\nعلیرضا دبیر، رییس فدراسیون کشتی جمهوری اسلامی در گفتگویی با خبرنگاران درباره حواشی صدور ویزا برای تیم ملی فوتبال گفت: «وظیفه‌شان است که ویزا بدهند، اگر نمی‌توانند بدهند، بی‌خود کرده‌اند میزبان جام جهانی شده‌اند.»\n@iranintltvsport", "date": "2026-05-03 17:09:09"}, {"text": "شهروندی با ارسال یک پیام به ایران‌اینترنشنال با اشاره به تورم، رکود و افزایش هزینه‌ها می‌گوید این مشکلات «گلویم را فشار می‌دهد».\n@iranintltv", "date": "2026-05-03 17:32:41"}, {"text": "اسکات بسنت، وزیر خزانه‌داری آمریکا، به فاکس‌نیوز گفت سپاه پاسداران نهادی فاسد است که سال‌ها از مردم ایران دزدی کرده و دارایی‌هایی در خارج از کشور دارد. او افزود آمریکا رد این پول‌ها را پیدا کرده و به این کار ادامه می‌دهد تا این دارایی‌ها را برای مردم ایران حفظ کند.\nبسنت گفت سه هفته پیش دونالد ترامپ دستور آغاز اجرای فشار اقتصادی را داده است. او این روند را «محاصره اقتصادی واقعی» خواند و افزود همه بخش‌های دولت، از جمله نیروی دریایی، در اجرای آن مشارکت دارند و هیچ کشتی‌ای عبور نمی‌کند.\nاو همچنین گفت با افزایش فشار بر افرادی که برای کمک به سپاه پول به ایران منتقل می‌کنند، دارایی‌های سپاه در حال مسدود شدن است و این نهاد دیگر قادر به پرداخت حقوق نیروهایش ن         function renderMessages(channelName) {
            const container = document.getElementById('messagesContainer');
            const countBadge = document.getElementById('messageCount');
            if (!channelName || !channelData[channelName]) {
                container.innerHTML = '<div class="error-message">⚠️ لطفاً یک کانال معتبر انتخاب کنید.</div>';
                countBadge.textContent = '';
                return;
            }
            const data = channelData[channelName];
            if (data.status === 'error') {
                container.innerHTML = '<div class="error-message">❌ ' + escapeHtml(data.error) + '</div>';
                countBadge.textContent = 'خطا در دریافت';
                return;
            }
            const messages = data.messages;
            if (!messages.length) {
                container.innerHTML = '<div class="error-message">⚠️ هیچ پیامی برای این کانال یافت نشد.</div>';
                countBadge.textContent = '۰ پیام';
                return;
            }
            countBadge.textContent = '📨 ' + messages.length + ' پیام';
            let html = '';
            for (let i = 0; i < messages.length; i++) {
                let msg = messages[i];
                let text = escapeHtml(msg.text).replace(/\n/g, '<br>');
                text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
                html += '<div class="message">' +
                        '<div class="date">🕒 ' + escapeHtml(msg.date) + '</div>' +
                        '<div class="text">' + text + '</div>' +
                        '</div>';
            }
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const selectEl = document.getElementById('channelSelect');
        selectEl.addEventListener('change', (e) => renderMessages(e.target.value));
        if (selectEl.options.length > 1) {
            selectEl.selectedIndex = 1;
            renderMessages(selectEl.value);
        }
    
    </script>
